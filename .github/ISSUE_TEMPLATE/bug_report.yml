name: Bug Report
description: Report a bug in the app or content
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill out the fields below.

  - type: dropdown
    id: bug-type
    attributes:
      label: Bug type
      options:
        - App crash
        - Wrong card content (incorrect information)
        - Politician no longer in office
        - Missing politician
        - Sync issue (progress not saving)
        - Visual / UI issue
        - Performance issue
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Go to...
        3. See error
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Web
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "1.0.0"

  - type: textarea
    id: content-correction
    attributes:
      label: Content correction (if reporting wrong information)
      description: |
        If a card has incorrect information, provide:
        - Politician name
        - What is wrong
        - Correct information with source URL
