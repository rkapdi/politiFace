# Cheap guards against accidentally committing secrets.
# Dependency vulnerability scanning lives in Codemagic once we wire it.

name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-no-secrets:
    name: No secrets committed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify .env not tracked
        run: |
          if git ls-files --error-unmatch app/.env 2>/dev/null; then
            echo "ERROR: app/.env is tracked by git. Remove with:"
            echo "  git rm --cached app/.env"
            exit 1
          fi
          echo "OK: .env not tracked."

      - name: Verify no keystore / signing material
        run: |
          if find . -name '*.jks' -o -name '*.keystore' -o -name '*.p12' -o -name 'key.properties' | grep -q .; then
            echo "ERROR: Signing material found in repo."
            exit 1
          fi
          echo "OK: no signing material committed."
