# .github/workflows/security.yml
#
# Runs weekly and on every push to main.
# Checks for known vulnerabilities in Flutter dependencies.
# Also scans for accidentally committed secrets.

name: Security Audit

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Audit pub dependencies
        run: dart pub audit
        # Exits non-zero if critical vulnerabilities found
        # See: https://dart.dev/tools/pub/cmd/pub-audit

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        # Catches Supabase keys, API tokens, etc. accidentally committed

  check-env-not-committed:
    name: Check .env not committed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify .env not in repo
        run: |
          if git ls-files --error-unmatch app/.env 2>/dev/null; then
            echo "ERROR: app/.env is tracked by git. Remove it immediately:"
            echo "  git rm --cached app/.env"
            echo "  echo '.env' >> .gitignore"
            exit 1
          fi
          echo "✅ .env is not tracked — good"

      - name: Verify keystore not committed
        run: |
          if find . -name "*.jks" -o -name "*.keystore" | grep -q .; then
            echo "ERROR: Keystore file found in repo. Remove it immediately."
            exit 1
          fi
          echo "✅ No keystore files found"
