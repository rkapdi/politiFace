name: eo-refresh

# Weekly executive-order refresh: re-runs the Federal Register fetcher and
# opens a PR when new orders exist. Content changes stay reviewable (the
# fetcher output is deterministic, so the diff is exactly the new orders).

on:
  schedule:
    - cron: "23 11 * * 1" # Mondays 11:23 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Fetch executive orders
        run: python scripts/fetch_executive_orders.py

      - name: Sync bundled copy
        run: cp content/atlas/executive_orders.yaml app/assets/content/atlas/executive_orders.yaml

      - name: Validate
        run: python scripts/ingest_content.py --check

      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: content/eo-refresh
          title: "Content: executive order refresh"
          commit-message: "Content: executive order refresh (Federal Register)"
          body: |
            Automated weekly refresh from the Federal Register API.
            The diff is the set of newly published executive orders;
            review titles for accuracy and merge.
          delete-branch: true