# .github/workflows/content-pipeline.yml
#
# Validates and seeds government and deck YAML files.
# Runs on every PR (validate only) and on merge to main (validate + seed).

name: Content Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
  pull_request:
    branches: [main]
    paths:
      - 'content/**'

jobs:
  # ── Validate government structure YAMLs ─────────────────────────────────────
  validate-governments:
    name: Validate Government YAMLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml jsonschema requests

      - name: Validate all government YAMLs
        run: |
          FAILED=0
          for f in content/governments/**/*.yaml; do
            echo "Validating $f..."
            python scripts/validate_government.py "$f" || FAILED=1
          done
          exit $FAILED

  # ── Validate deck YAMLs ──────────────────────────────────────────────────────
  validate-decks:
    name: Validate Deck YAMLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml jsonschema requests

      - name: Validate all deck YAMLs
        run: |
          FAILED=0
          for f in content/decks/**/*.yaml; do
            echo "Validating $f..."
            python scripts/validate_decks.py "$f" || FAILED=1
          done
          exit $FAILED

  # ── Seed to Supabase (main branch only) ──────────────────────────────────────
  seed-content:
    name: Seed to Supabase
    runs-on: ubuntu-latest
    needs: [validate-governments, validate-decks]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml supabase

      - name: Seed governments
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/seed_governments.py content/governments/

      - name: Seed decks
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/seed_decks.py content/decks/

      - name: Invalidate Cloudflare edge cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/invalidate_cache.py

  # ── Flutter tests (runs on all PRs) ──────────────────────────────────────────
  flutter-tests:
    name: Flutter Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: app
        run: flutter pub get

      - name: Generate Drift + Riverpod code
        working-directory: app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run unit tests
        working-directory: app
        run: flutter test test/

      - name: Check for linting issues
        working-directory: app
        run: flutter analyze
