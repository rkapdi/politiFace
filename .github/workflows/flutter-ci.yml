# .github/workflows/flutter-ci.yml
#
# Runs on every PR and push to main/dev.
# Blocks merge if tests fail or lint errors exist.
# Does NOT deploy — deployment is Codemagic's job.

name: Flutter CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'app/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'app/**'

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true  # Cancel in-progress runs on new push

jobs:
  test-and-lint:
    name: Test + Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true          # Cache Flutter SDK between runs

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            app/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('app/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift + Riverpod code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify no uncommitted generated files
        run: |
          # In CI, generated files should be checked in or clean
          # If they differ, the dev forgot to run build_runner before committing
          git diff --exit-code || {
            echo "Generated files are out of sync. Run:"
            echo "  dart run build_runner build --delete-conflicting-outputs"
            echo "and commit the .g.dart files."
            exit 1
          }

      - name: Analyze (lint)
        run: flutter analyze --fatal-infos

      - name: Run unit tests
        run: flutter test --coverage test/

      - name: Check FSRS algorithm tests specifically
        run: |
          flutter test test/features/session/domain/fsrs_algorithm_test.dart \
            --reporter expanded
        # These are flagged separately because a failing FSRS test
        # means the scheduling algorithm is broken — highest severity.

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: app/coverage/lcov.info
          fail_ci_if_error: false  # Coverage failure doesn't block merge

  # ── Build sanity check (no deployment) ────────────────────────────────────
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test-and-lint
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create .env for build
        run: |
          echo "SUPABASE_URL=https://placeholder.supabase.co" >> .env
          echo "SUPABASE_ANON_KEY=placeholder" >> .env
          echo "POSTHOG_API_KEY=placeholder" >> .env
          echo "POSTHOG_HOST=https://app.posthog.com" >> .env
          echo "SENTRY_DSN=https://placeholder@sentry.io/1" >> .env

      - name: Build web (fastest build check)
        run: flutter build web --release
        # If this fails, the app won't compile — catch it before Codemagic
