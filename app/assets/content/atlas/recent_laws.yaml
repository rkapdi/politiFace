- law_number: 119-64
  title: Disaster Related Extension of Deadlines Act
  bill: HR 1491
  enacted_date: '2025-12-26'
  origin_chamber: House
  sponsor:
    bioguide: M001210
    name: Rep. Murphy, Gregory F. [R-NC-3]
  url: https://www.congress.gov/bill/119th-congress/house-bill/1491
  summary: 'Disaster Related Extension of Deadlines Act


    This act requires the Internal Revenue Service (IRS) to treat the postponement of the
    federal tax return deadline due to a federally declared disaster or certain other events
    as an extension of such deadline for purposes of calculating the limit on a tax refund.
    The act also provides that the IRS’s deadline for sending certain notices includes such
    postponement.


    Under current law, a tax refund claim must be filed within three years of the date that
    the federal tax return is filed. (Some exceptions apply.) The tax refund amount generally
    is limited to federal taxes paid within the three years preceding the tax refund claim
    plus any extension of the federal tax return deadline (known as the lookback period).
    Under the law in effect prior to this act, the postponement of the federal tax return
    deadline is not an extension for purposes of the lookback period. Thus, under prior law,
    certain tax payments (e.g., amounts withheld from a paycheck for federal taxes) made before
    the federal tax return is filed may be outside the lookback period and non-refundable.


    Under the act, a federal tax return deadline postponed due to a federally declared disaster
    or certain other events must be treated as an extension of such deadline for purposes
    of the lookback period.


    Further, under current law, the IRS is required to mail a notice and demand for tax payment
    within 60 days of an assessment but not before the tax payment due date.


    The act provides that the tax payment due date includes the postponement of the tax payment
    deadline due to a federally declared disaster or certain other events.'
  summary_version: Public Law
  summary_date: '2025-12-26'
  summary_truncated: false
- law_number: 119-63
  title: Alaska Native Vietnam Era Veterans Land Allotment Extension Act of 2025
  bill: HR 410
  enacted_date: '2025-12-26'
  origin_chamber: House
  sponsor:
    bioguide: B001323
    name: Rep. Begich, Nicholas [R-AK-At Large]
  url: https://www.congress.gov/bill/119th-congress/house-bill/410
  summary: 'Alaska Native Vietnam Era Veterans Land Allotment Extension Act of 2025


    This act extends for an additional five years the time period during which an eligible
    Alaska Native veteran may apply for a land allotment under the Alaska Native Vietnam Era
    Veterans Land Allotment Program. The program makes Alaska Native veterans who served in
    the Armed Forces in Vietnam between August 5, 1964, and December 31, 1971, or their heirs
    eligible to receive up to 160 acres of federal land in Alaska.


    Under the current program, the Department of the Interior''s Bureau of Land Management
    may accept applications through December 29, 2025. This act extends this time period for
    an additional five years to December 29, 2030.'
