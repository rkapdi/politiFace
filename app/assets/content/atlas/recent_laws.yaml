- law_number: 119-62
  title: MAPWaters Act of 2025
  bill: HR 187
  enacted_date: '2025-12-26'
  origin_chamber: House
  sponsor:
    bioguide: M001213
    name: Rep. Moore, Blake D. [R-UT-1]
  url: https://www.congress.gov/bill/119th-congress/house-bill/187
  summary: 'Modernizing Access to our Public Waters Act or the MAPWaters Act of 2025 or the
    MAPWaters Act of 2025


    This act directs the Forest Service and the Department of the Interior to standardize
    and publish data relating to the public''s access to federal waterways for recreational
    use.


    (Sec. 3) The Forest Service and Interior must jointly develop and adopt interagency standards
    for data collection and dissemination of geospatial data relating to public outdoor recreational
    access of federal waterways and federal fishing restrictions. The standards must ensure
    compatibility and interoperability among applicable federal databases with respect to
    collection and dissemination of such data.


    (Sec. 4) Within five years, the Forest Service and Interior must also digitize and make
    publicly available online certain geographic information system data about (1) federal
    waterway restrictions, (2) federal waterway access and navigation information, and (3)
    federal fishing restrictions. They must also update the data about waterway restrictions,
    waterway access, and navigation information at least twice per year. Data about fishing
    restrictions must be updated in real time as changes go into effect.


    The Forest Service and Interior must also develop a process to allow members of the public
    to submit questions or comments regarding the data regarding waterway restrictions, waterway
    access, and navigation information.


    The requirements under this section do not apply to irrigation canals and flowage easements.


    (Sec. 5) To carry out the act, the Forest Service and Interior may (1) coordinate and
    partner with nonfederal agencies, private entities, and nonprofit partners; and (2) enter
    into agreements with third parties.


    The Forest Service and Interior may work with the U.S. Geological Survey to collect, aggregate,
    digitize, standardize, and publish data on their behalf.


    (Sec. 6) The Forest Service and Interior must annually report to specified congressional
    committees on their progress in meeting the requirements of this act.'
  summary_version: Public Law
  summary_date: '2025-12-26'
  summary_truncated: false
- law_number: 119-61
  title: Wounded Knee Massacre Memorial and Sacred Site Act
  bill: HR 165
  enacted_date: '2025-12-19'
  origin_chamber: House
  sponsor:
    bioguide: J000301
    name: Rep. Johnson, Dusty [R-SD-At Large]
  url: https://www.congress.gov/bill/119th-congress/house-bill/165
  summary: 'Wounded Knee Massacre Memorial and Sacred Site Act


    This act directs the Department of the Interior to complete all actions necessary to place
    approximately 40 acres of land in Oglala Lakota County, South Dakota, into restricted
    fee status for the Oglala Sioux Tribe and the Cheyenne River Sioux Tribe. Restricted fee
    status refers to land that is owned by a tribe or tribal member but is subject to restrictions
    by the United States against alienation (i.e., sale or transfer) or encumbrance (e.g.,
    liens, leases, or rights-of-way) by operation of law.


    The act requires the land to be held and maintained as a memorial and sacred site, as
    outlined by the document titled Covenant Between the Oglala Sioux Tribe and the Cheyenne
    River Sioux Tribe and dated October 21, 2022. Further, it prohibits commercial development
    and gaming activity on the land.'
  summary_version: Public Law
  summary_date: '2025-12-19'
  summary_truncated: false
- law_number: 119-60
  title: National Defense Authorization Act for Fiscal Year 2026
  bill: S 1071
  enacted_date: '2025-12-18'
  origin_chamber: Senate
  sponsor:
    bioguide: C001056
    name: Sen. Cornyn, John [R-TX]
  url: https://www.congress.gov/bill/119th-congress/senate-bill/1071
  summary: 'National Defense Authorization Act for Fiscal Year 2026


    This bill sets forth policies and authorities for FY2026 for Department of Defense (DOD)
    programs and activities, military construction, and the national security programs of
    the Department of Energy (DOE). The bill also sets forth policies and authorities for
    the Department of State, the Coast Guard, and the Intelligence Community (IC).


    Among other elements, the bill


    authorizes the procurement of various items, including aircraft, ships, and missiles;


    sets active duty and reserve component personnel strength levels;


    sets policy regarding various aspects of military health care and military compensation;


    sets policy regarding DOD acquisitions and acquisition management, including contracting
    authorities and domestic sourcing;


    sets policy for various matters related to DOD interactions with foreign nations, including
    matters concerning Israel, Ukraine, and the Indo-Pacific;


    sets policy for various matters related to DOD cyber operations, cybersecurity, and artificial
    intelligence;


    authorizes specified military construction projects and extends the authorization of certain
    projects from previous fiscal years;


    authorizes the National Nuclear Security Administration, Defense Nuclear Facilities Safety
    Board, Naval Petroleum Reserves, and Maritime Administration;


    sets policy regarding the organization and workforce of the State Department;


    sets acquisition and personnel policy for the Coast Guard;


    sets policy for merchant mariner credentials, vessel safety, and oil pollution response;
    and


    sets policy for the IC regarding artificial intelligence and biotechnology.


    For additional information on the National Defense Authorization Act (NDAA) see


    In Focus IF10516, Defense Primer: Navigating the NDAA, and


    In Focus IF10515, Defense Primer: The NDAA Process.'
  summary_version: Passed House
  summary_date: '2025-12-10'
