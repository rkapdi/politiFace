  sponsor:
    bioguide: S001198
    name: Sen. Sullivan, Dan [R-AK]
  url: https://www.congress.gov/bill/119th-congress/senate-bill/216
  summary: 'Save Our Seas 2.0 Amendments Act


    This bill reauthorizes and modifies administration of Marine Debris Program (MDP) activities
    and the Marine Debris Foundation. (The program and the foundation support efforts to assess,
    prevent, and otherwise address marine debris and its adverse impacts on the U.S. economy,
    the marine environment, and navigation safety.)


    First, the bill reauthorizes the National Oceanic and Atmospheric Administration''s (NOAA''s)
    Marine Debris Program through FY2029. The bill authorizes NOAA to provide contributions
    for MDP project costs on an in-kind basis in an amount that NOAA determines represents
    the value it derives from the project. The bill also authorizes NOAA to enter into agreements
    other than cooperative agreements, contracts, and grant agreements for projects.


    Next, the bill modifies requirements for the Marine Debris Foundation and reauthorizes
    it for FY2025. Among other changes, the bill designates the current Chief Operating Officer
    (i.e., the first officer or employee appointed by the board) as the Chief Executive Officer
    (CEO) and specifies that the board has the authority to appoint, review the performance
    of, and remove the CEO. The bill authorizes the CEO to appoint, supervise, and remove
    foundation employees and officers.


    Further, the bill directs the foundation to develop and implement best practices for conducting
    outreach to Indian tribes and tribal governments. The foundation must locate its principal
    office in the National Capital Region or a coastal shoreline community.


    Finally, the bill authorizes the foundation to match contributions from regional organizations,
    Indian tribes, tribal organizations, and foreign governments.'
