- law_number: 119-69
  title: Whole Milk for Healthy Kids Act of 2025
  bill: S 222
  enacted_date: '2026-01-14'
  origin_chamber: Senate
  sponsor:
    bioguide: M001198
    name: Sen. Marshall, Roger [R-KS]
  url: https://www.congress.gov/bill/119th-congress/senate-bill/222
  summary: 'Whole Milk for Healthy Kids Act of 2025


    This act revises requirements for milk provided by the National School Lunch Program of
    the Department of Agriculture (USDA) to allow schools to offer students whole and reduced-fat
    milk. The act also requires that local school food service personnel receive annual training
    and certification on food allergies.


    The act permits schools to offer students whole, reduced-fat (2%), low-fat (1%), and fat-free
    flavored and unflavored milk. The milk that is offered may be organic or nonorganic. Currently,
    USDA regulations require milk to be fat-free or low-fat and allow milk to be flavored
    or unflavored. The act also removes the requirement that schools participating in the
    program must provide milk that is consistent with the most recent Dietary Guidelines for
    Americans.


    The act also expands the nondairy beverages that are included in the program by allowing
    schools to offer all students nondairy beverages that are nutritionally equivalent to
    fluid milk and that meet nutritional standards established by USDA.


    Further, schools currently must provide a substitute for fluid milk, on receipt of a written
    statement from a licensed physician, for students whose disability restricts their diet.
    Under the act, a parent or legal guardian may also provide the written statement.


    In addition, the act excludes fluid milk from the saturated fat content calculation for
    school meals. Currently, schools participating in the program must provide meals that
    meet certain nutrition requirements; USDA regulations require that the average saturated
    fat content of the meals offered must be less than 10% of the total calories. Under the
    act, milk fat included in any fluid milk provided by the program must not be considered
    saturated fat for the purposes of measuring compliance with USDA regulations.


    Finally, the program''s mandatory training and certification for local school food service
    personnel must include a module on food allergies, including information on the best practices
    to prevent, recognize, and respond to food-related allergic reactions. Food service personnel
    must receive an annual certification to demonstrate competence in the food allergies training
    and other training modules that are provided.'
  summary_version: Public Law
  summary_date: '2026-01-14'
  summary_truncated: false
