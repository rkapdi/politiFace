  summary: 'Consolidated Appropriations Act, 2026


    This bill provides appropriations to several federal departments and agencies for the
    remainder of FY2026 and provides continuing FY2026 appropriations for the Department of
    Homeland Security (DHS) through February 13, 2026. It also extends various expiring programs
    and authorities.


    Specifically, the bill includes 5 of the 12 regular FY2026 appropriations bills:


    the Department of Defense Appropriations Act, 2026;


    the Departments of Labor, Health and Human Services, and Education, and Related Agencies
    Appropriations Act, 2026;


    the Transportation, Housing and Urban Development, and Related Agencies Appropriations
    Act, 2026;


    the Financial Services and General Government Appropriations Act, 2026; and


    the National Security, Department of State, and Related Programs Appropriations Act, 2026.


    The departments, agencies, and activities funded in the bill include


    the Department of Defense,


    the Department of Labor,


    the Department of Health and Human Services,


    the Department of Education,


    the Department of Transportation,


    the Department of Housing and Urban Development,


    the Department of the Treasury,


    the Executive Office of the President,


    the judiciary,


    the District of Columbia,


    the Department of State and related programs,


    the administration and oversight of foreign assistance programs,


    bilateral economic assistance,


    international security assistance,


    multilateral assistance,


    export and investment assistance, and


    several related and independent agencies.


    In addition, the bill includes a continuing resolution (CR) that provides continuing FY2026
    appropriations to DHS through the earlier of February 13, 2026, or the enactment of the
    DHS appropriations act. The CR funds most DHS programs and activities at the FY2025 levels.


    The bill also extends several expiring programs and authorities, including


    the U.S. Grain Standards Act;


    the Commodity Futures Trading Commission’s whistleblower program;


    the National Flood Insurance Program;


    the Forest Service''s participation in the Agriculture Conservation Experienced Services
    Program;


    the Transportation Security Administration’s Reimbursable Screening Services Program;


    the Motor Carrier Safety Advisory Committee;


    several authorities and programs related to cybersecurity;


    the technology modernization fund and board;


    the U.S. Parole Commission;'
