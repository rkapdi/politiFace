- law_number: 119-89
  title: Rural Broadband Protection Act of 2025
  bill: S 98
  enacted_date: '2026-05-11'
  origin_chamber: Senate
  sponsor:
    bioguide: C001047
    name: Sen. Capito, Shelley Moore [R-WV]
  url: https://www.congress.gov/bill/119th-congress/senate-bill/98
  summary: 'Rural Broadband Protection Act of 2025


    This act requires the Federal Communications Commission (FCC) to vet the qualifications
    of applicants for certain funding programs that support affordable broadband deployment
    in high-cost areas (e.g., rural communities).


    Specifically, the FCC must develop a vetting process for applicants seeking funding under
    high-cost universal service programs for the deployment of a broadband-capable network
    and the provision of supported services over the network. The FCC must require applicants
    to submit a proposal that contains sufficient detail and documentation for the FCC to
    ascertain that the applicant possesses the technical, financial, and operational capabilities
    related to the proposed deployment and has a reasonable business plan. The FCC must evaluate
    applications against reasonable and well-established standards and must consider each
    applicant’s history of compliance with the requirements of other government broadband
    funding programs.


    The FCC must establish this vetting process through a rulemaking proceeding. After the
    rule is finalized, funds may only be awarded to applicants that satisfy the standards
    established therein.


    Finally, the FCC must set financial penalties for applicants that default in some manner
    during the evaluation process before they are authorized to begin receiving support.'
  summary_version: Public Law
  summary_date: '2026-05-11'
  summary_truncated: false
- law_number: 119-88
  title: Tribal Trust Land Homeownership Act of 2025
  bill: S 723
  enacted_date: '2026-05-04'
  origin_chamber: Senate
  sponsor:
    bioguide: T000250
    name: Sen. Thune, John [R-SD]
  url: https://www.congress.gov/bill/119th-congress/senate-bill/723
  summary: 'Tribal Trust Land Homeownership Act of 2025


    This act sets forth requirements for the processing of a proposed residential leasehold
    mortgage, business leasehold mortgage, land mortgage, or right-of-way document by the
    Bureau of Indian Affairs (BIA). The BIA must notify lenders upon receipt of such documentation,
    perform a preliminary review of such documents not later than 10 days after receipt, and
    approve or disapprove of such documents within 20 or 30 days, depending on the type of
    application.


    Additionally, the act sets forth requirements for the BIA regarding (1) response times
    for the completion of certified title status reports, (2) notification of delays in processing,
    and (3) the form of notices and delivery of certain reports.


    The act also provides relevant federal agencies and Indian tribes with read-only access
    to the Trust Asset and Accounting Management System maintained by the BIA.


    The Government Accountability Office must report on digitizing documents for the purpose
    of streamlining and expediting the completion of mortgage packages for residential mortgages
    on Indian land.


    Finally, the act establishes within the BIA''s Division of Real Estate Services the position
    of Realty Ombudsman.'
  summary_version: Public Law
  summary_date: '2026-05-04'
  summary_truncated: false
- law_number: 119-87
  title: A bill to amend the FISA Amendments Act of 2008 to extend the authorities of title
    VII of the Foreign Intelligence Surveillance Act of 1978, and for other purposes.
  bill: S 4465
  enacted_date: '2026-04-30'
  origin_chamber: Senate
  sponsor:
    bioguide: C001095
    name: Sen. Cotton, Tom [R-AR]
  url: https://www.congress.gov/bill/119th-congress/senate-bill/4465
  summary: 'This act extends the authorities of Title VII of the Foreign Intelligence Surveillance
    Act (FISA) until June 12, 2026.


    Title VII of FISA generally addresses electronic surveillance and other methods of acquiring
    foreign intelligence information that are directed at targets outside the United States.
    Title VII includes surveillance under Section 702, which concerns acquiring communications
    of non-U.S. persons believed to be outside the United States to obtain foreign intelligence
    information. Information about U.S. persons may incidentally be acquired by this type
    of surveillance and subsequently queried (searched) under certain circumstances.


    For additional information see


    CRS In Focus, IF11451 Foreign Intelligence Surveillance Act (FISA); and


    CRS Report, R48592 FISA Section 702 and the 2024 Reforming Intelligence and Securing America
    Act.'
  summary_version: Public Law
  summary_date: '2026-04-30'
  summary_truncated: false
- law_number: 119-86
  title: Homeland Security and Further Additional Continuing Appropriations Act, 2026.
  bill: HR 7147
  enacted_date: '2026-04-30'
  origin_chamber: House
  sponsor:
    bioguide: C001053
    name: Rep. Cole, Tom [R-OK-4]
  url: https://www.congress.gov/bill/119th-congress/house-bill/7147
  summary: 'Further Additional Continuing Appropriations Act, 2026


    This bill provides continuing FY2026 appropriations to the Department of Homeland Security
    (DHS) through May 22, 2026. It is known as a continuing resolution (CR) and ends the partial
    DHS shutdown that began on February 14, 2026, due to a lapse in appropriations for DHS.


    The CR generally funds most DHS agencies and programs at the FY2025 levels through the
    earlier of May 22, 2026, or the enactment of the FY2026 DHS appropriations act.


    The bill also authorizes back pay, in accordance with current law, for federal employees
    who were affected by the partial DHS shutdown.


    Finally, the bill ratifies and approves certain obligations that were incurred during
    the partial DHS shutdown, including obligations incurred to maintain the essential level
    of activity to protect life and property and bring about an orderly termination of government
    functions.'
  summary_version: House agreed to Senate amendment
  summary_date: '2026-03-27'
