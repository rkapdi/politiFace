  summary: 'This act authorizes the Federal Energy Regulatory Commission (FERC) to extend
    construction deadlines for hydropower projects that were issued a license before March
    13, 2020. FERC is authorized, upon the request of the licensees, to extend the deadline
    for beginning construction on such projects an additional six years beyond the eight-year
