- law_number: 119-77
  title: Ending Improper Payments to Deceased People Act
  bill: S 269
  enacted_date: '2026-02-10'
  origin_chamber: Senate
  sponsor:
    bioguide: K000393
    name: Sen. Kennedy, John [R-LA]
  url: https://www.congress.gov/bill/119th-congress/senate-bill/269
  summary: 'Ending Improper Payments to Deceased People Act


    This act permanently allows the Department of the Treasury to access certain death records
    maintained by the Social Security Administration (SSA) to help prevent and recover improper
    payments (e.g., payments to deceased individuals). The act also establishes evidentiary
    requirements the SSA must meet before identifying an individual as deceased.


    Current law requires the SSA to share its Death Master File with the Do Not Pay system
    maintained by Treasury for three years. The act makes this requirement permanent. Treasury
    must enter into an agreement with the SSA related to Treasury''s share of the cost of
    state death data.


    The act also prohibits the SSA from recording a death in the master file unless the SSA
    has clear and convincing evidence that the individual should be presumed deceased. If
    an individual is incorrectly identified as deceased and provides the SSA with supporting
    documentation, the SSA may notify certain agencies that have access to the master file,
    including Treasury and federal or state agencies that provide or disburse federally funded
    benefits.'
  summary_version: Public Law
