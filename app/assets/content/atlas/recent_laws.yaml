- law_number: 119-99
  title: ARTIST Act
  bill: S 254
  enacted_date: '2026-06-12'
  origin_chamber: Senate
  sponsor:
    bioguide: S001198
    name: Sen. Sullivan, Dan [R-AK]
  url: https://www.congress.gov/bill/119th-congress/senate-bill/254
  summary: 'Alaska’s Right to Ivory Sales and Tradition Act or the ARTIST Act


    This act prohibits states from imposing bans on marine mammal products produced by Alaska
    Natives.


    Specifically, states may not prohibit the interstate commerce, importation, sale, transfer,
    trade, barter, or possession of marine mammal ivory, marine mammal bone, or baleen legally
    produced by an Alaska Native as an authentic Alaska Native article of handicrafts and
    clothing.'
