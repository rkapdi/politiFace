- law_number: 119-98
  title: Secure America Act
  bill: S 2
  enacted_date: '2026-06-10'
  origin_chamber: Senate
  sponsor:
    bioguide: G000359
    name: Sen. Graham, Lindsey [R-SC]
  url: https://www.congress.gov/bill/119th-congress/senate-bill/2
  summary: 'Secure America Act


    This act provides $70 billion in funding to the Department of Homeland Security (DHS),
    U.S. Customs and Border Protection (CBP), and U.S. Immigration and Customs Enforcement
    (ICE) through FY2029 for immigration enforcement, border security, and related activities.


    It is known as a reconciliation bill and includes legislation submitted by certain congressional
    committees pursuant to provisions in the FY2026 congressional budget resolution (S. Con.
    Res. 33) that directed the committees to submit legislation to the House or Senate Budget
    Committee that will increase the deficit. (Reconciliation bills are considered by Congress
    using expedited legislative procedures that prevent a filibuster and restrict amendments
    in the Senate.)


    TITLE I--COMMITTEE ON HOMELAND SECURITY AND GOVERNMENTAL AFFAIRS


    (Sec. 101) This section provides funding for CBP to hire, pay, train, and equip Border
    Patrol agents and Border Patrol support personnel to conduct functions other than immigration
    enforcement and customs functions.


    The funds provided by this section may not be used to recruit, hire, or train personnel
    for the duties of processing coordinators after October 31, 2028.


    (Sec. 102) This section provides funding to ICE for (1) hiring, paying, training, and
    equipping Homeland Security Investigations (HIS) agents and support personnel; and (2)
    other necessary expenses for HSI’s mission support and operations and maintenance.


    It also requires specified funds to be used to hire, pay, and equip additional child exploitation
    investigators and forensics analysts for certain HSI offices to (1) support the identification
    and rescue of victims of child sexual exploitation and abuse, and (2) train such personnel
    and state and local law enforcement regarding identifying victims of child sexual exploitation
    and abuse.


    The funds provided by this section must be used for functions other than those related
    to HSI’s immigration enforcement and customs enforcement missions.


    (Sec. 103) This section provides funding to CBP for border security, technology, and screening,
    including


    procurement and integration of new nonintrusive inspection equipment and associated civil
    works (e.g., artificial intelligence, machine learning, and other innovative technologies)
    and other mission support to combat the entry or exit of illicit narcotics at ports of
    entry and along the southwest, northern, and maritime borders;'
