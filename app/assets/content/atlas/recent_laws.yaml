  url: https://www.congress.gov/bill/119th-congress/senate-bill/1003
  summary: 'Lulu’s Law


    This act requires the Federal Communications Commission to issue an order explicitly permitting
    the transmission of wireless emergency alerts to mobile phones in the event of a shark
    attack.


    (Under current regulations, authorized government authorities are permitted to send wireless
    emergency alerts regarding public safety emergencies, including severe weather, missing
    children, and other threats to life or property.)'
