- law_number: 119-57
  title: Foundation of the Federal Bar Association Charter Amendments Act of 2025
  bill: S 616
  enacted_date: '2025-12-12'
  origin_chamber: Senate
  sponsor:
    bioguide: K000393
    name: Sen. Kennedy, John [R-LA]
  url: https://www.congress.gov/bill/119th-congress/senate-bill/616
  summary: 'Foundation of the Federal Bar Association Charter Amendments Act of 2025


    This act revises the federal charter for the Foundation of the Federal Bar Association
    to shift authority from the charter to the bylaws.


    Specifically, it makes the following changes:


    removes the requirement for the foundation to be incorporated and domiciled in the District
    of Columbia;


    requires the board of directors to decide, and specify in the bylaws, the location of
    the principal office;


    specifies that the bylaws—not the charter—must provide for the terms of membership, the
    responsibilities of the board of directors, and the election of officers;


    prohibits a director or officer, in his or her corporate capacity, from contributing to,
    supporting, or participating in political activities;


    allows income and assets of the corporation to be used to reasonably compensate or reimburse
    expenses of an officer, director, or member; to award a grant to the Federal Bar Association
    chapter of an officer, director, or member; and to reasonably compensate employees;


    expands a prohibition on loans for directors and officers to include members and employees;
    and


    specifies that on dissolution or final liquidation, any remaining assets must be distributed
    as provided by the board of directors instead of deposited in the Treasury.'
  summary_version: Public Law
  summary_date: '2025-12-12'
  summary_truncated: false
- law_number: 119-56
  title: Veteran Fraud Reimbursement Act of 2025
  bill: HR 1912
  enacted_date: '2025-12-12'
  origin_chamber: House
  sponsor:
    bioguide: C001078
    name: Rep. Connolly, Gerald E. [D-VA-11]
  url: https://www.congress.gov/bill/119th-congress/house-bill/1912
  summary: 'Veteran Fraud Reimbursement Act of 2025


    This act modifies the procedures by which the Department of Veterans Affairs (VA) reissues
    misused benefits to a beneficiary, including by requiring the VA to establish methods
    and timing with respect to determining whether an instance of misuse by a fiduciary is
    the result of negligence by the VA. The act also provides that if a beneficiary predeceases
    a reissuance, the VA must pay the amount to a surviving beneficiary in the same method
    as certain other VA benefits are paid upon the death of a beneficiary.


    Under the act, the VA may not withhold the reissuing of a benefit payment by reason of
    a pending determination regarding the VA''s negligence in relation to the instance of
    misuse by a fiduciary. Additionally, the VA is not required to make a determination regarding
    its negligence for each instance of misuse by a fiduciary of all or part of an individual''s
    benefit paid to such fiduciary.'
  summary_version: Public Law
  summary_date: '2025-12-12'
  summary_truncated: false
