- law_number: 119-78
  title: Disapproving the action of the District of Columbia Council in approving the D.C.
    Income and Franchise Tax Conformity and Revision Temporary Amendment Act of 2025.
  bill: HJRES 142
  enacted_date: '2026-02-18'
  origin_chamber: House
  sponsor:
    bioguide: G000603
    name: Rep. Gill, Brandon [R-TX-26]
  url: https://www.congress.gov/bill/119th-congress/house-joint-resolution/142
  summary: 'This joint resolution reinstates provisions of District of Columbia (DC) tax law
    to conform with federal tax law.


    As background, DC generally automatically adopts changes to federal tax law (known as
    rolling conformity). Therefore, upon enactment of the 2025 reconciliation act (commonly
    known as the One Big Beautiful Bill Act), many of its tax provisions became DC law. DC
    subsequently enacted its own legislation (the DC Income and Franchise Tax Conformity and
    Revision Temporary Amendment Act of 2025) that decoupled DC tax law from these federal
    provisions.


    This joint resolution nullifies the DC legislation, thereby generally realigning DC tax
    law with the tax provisions of the 2025 reconciliation act.


    Specifically, the joint resolution reinstates for DC provisions that


    • increase the higher basic standard deduction;

    • increase deductible charitable cash contributions (for taxpayers who take the standard
    deduction);

    • establish a $6,000 tax deduction for taxpayers 65 years and older;

    • allow a tax deduction of qualified tips, qualified overtime pay, and qualified car loan
    interest;

    • authorize an elective 100% depreciation allowance for nonresidential real property;
    and

    • authorize businesses to deduct 100% of research and experimental costs retroactive to
    tax year 2022.


    The DC legislation also amended several other provisions of DC tax law, including restoring
    the DC child tax credit. The joint resolution negates these changes.'
  summary_version: Public Law
  summary_date: '2026-02-18'
  summary_truncated: false
- law_number: 119-68
  title: La Paz County Solar Energy and Job Creation Act
  bill: HR 1043
  enacted_date: '2026-02-11'
  origin_chamber: House
  sponsor:
    bioguide: G000565
    name: Rep. Gosar, Paul A. [R-AZ-9]
  url: https://www.congress.gov/bill/119th-congress/house-bill/1043
  summary: 'La Paz County Solar Energy and Job Creation Act


    This act directs the Department of the Interior, after receiving a request from La Paz
    County, Arizona, to convey approximately 3,400 acres of identified land managed by the
    Bureau of Land Management to the county for fair market value.


    Interior must exclude from the conveyance any federal land that contains significant cultural,
    environmental, wildlife, or recreational resources.


    As a condition of the conveyance, La Paz County and any subsequent owner must


    make good faith efforts to avoid disturbing tribal artifacts;


    minimize impacts on tribal artifacts if they are disturbed;


    coordinate with the Colorado River Indian Tribes Tribal Historic Preservation Office to
    identify artifacts of cultural and historic significance; and


    allow tribal representatives to rebury unearthed artifacts at, or near, where they were
    discovered.


    The federal land is withdrawn from the operation of U.S. mining and mineral leasing laws,
    and thus the land is not available for new mining claims, new mineral or geothermal leases,
    nor sales of mineral materials.


    The county must pay all costs related to the conveyance.'
