  summary: 'Semiquincentennial Congressional Time Capsule Act


    This act requires the Architect of the Capitol to create a congressional time capsule
    in honor of the 250th anniversary of the Declaration of Independence to be buried in the
    Capitol Visitor Center on or before July 4, 2026.


    The time capsule shall contain a joint letter from congressional leadership (the Speaker
    and Minority Leader of the House of Representatives and the Majority and Minority Leaders
    of the Senate) and such other contents as they shall determine.


    The act directs the Architect of the Capitol to also install a plaque about the time capsule,
