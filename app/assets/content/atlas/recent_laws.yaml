- law_number: 119-95
  title: A bill to amend chapters 83 and 84 of title 5, United States Code, to authorize an
    increase of the retirement age for members of the Capitol Police.
  bill: S 4530
  enacted_date: '2026-05-29'
  origin_chamber: Senate
  sponsor:
    bioguide: M000355
    name: Sen. McConnell, Mitch [R-KY]
  url: https://www.congress.gov/bill/119th-congress/senate-bill/4530
  summary: 'This act authorizes the Capitol Police Board to increase the mandatory retirement
    age for a member of the Capitol Police to up to age 62 when the board determines such
    waiver is in the public interest.


    Under current law, members of the Capitol Police are generally subject to mandatory retirement
    at (1) age 57; or (2) upon completing 20 years of service if the member is older than
    57. Previously, a waiver from the board would authorize a member to continue working until
    age 60.


    The act authorizes the board to issue a waiver specifying a retirement age between 57
    and 62.'
  summary_version: Public Law
  summary_date: '2026-05-29'
