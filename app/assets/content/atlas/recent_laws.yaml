- law_number: 119-94
  title: Medal of Sacrifice Act
  bill: HR 3497
  enacted_date: '2026-05-28'
  origin_chamber: House
  sponsor:
    bioguide: M001199
    name: Rep. Mast, Brian J. [R-FL-21]
  url: https://www.congress.gov/bill/119th-congress/house-bill/3497
  summary: 'Medal of Sacrifice Act of 2025


    This act directs the President to issue a medal of sacrifice for eligible law enforcement
    officers and first responders who are killed in the line of duty.


    The act also directs the President to establish a commission on the medal of sacrifice
    and appoint its members. The act sets forth responsibilities of the commission, including
    to advise on the design of the medal and determine how the medal will be presented.


    Under the act, eligible law enforcement officers and first responders include federal,
    state, local, tribal, or territorial law enforcement officers or first responders who
    are not subject to an official act of wrongdoing (e.g., a determination that the officer
    or first responder acted outside the scope of their duties or in a manner that was not
    in accordance with official policies or procedures).


    A law enforcement officer or first responder who is subject to an official act of wrongdoing
    is generally not eligible for the medal of sacrifice. However, in the case of such an
    officer or first responder, the act requires the commission to investigate the circumstances
    surrounding the officer or first responder''s cause of death and issue a final determination
    on their eligibility.'
  summary_version: Public Law
  summary_date: '2026-05-28'
  summary_truncated: false
- law_number: 119-93
  title: Cape Fox Land Entitlement Finalization Act of 2025
  bill: HR 2815
  enacted_date: '2026-05-19'
  origin_chamber: House
  sponsor:
    bioguide: B001323
    name: Rep. Begich, Nicholas [R-AK-At Large]
  url: https://www.congress.gov/bill/119th-congress/house-bill/2815
  summary: 'Cape Fox Land Entitlement Finalization Act of 2025


    This act waives a statutory core township selection requirement for the Cape Fox Corporation
    and allows Cape Fox to receive other lands to fulfill its remaining land entitlement.
    Cape Fox is an Alaska Native village corporation for the Alaska Native village of Saxman,
    Alaska.


    Specifically, the act states that Cape Fox shall not be required to receive its previously
    selected land of approximately 185 acres located within the township in which the Alaska
    Native village of Saxman, Alaska, is located. Instead, the act allows Cape Fox to receive
    land outside of Cape Fox''s current exterior selection boundary upon written notice of
    the new selection to the Department of the Interior.


    In particular, if Cape Fox submits written notice of its selection of approximately 180
    acres of surface land within the Tongass National Forest in Alaska to Interior within
    90 days of the act''s enactment, then Interior must convey the federal land to Cape Fox.
    Upon conveyance of the surface estate of the federal land to Cape Fox, Interior must convey
    the subsurface estate of the federal land to Sealaska Corporation (the Alaska Native regional
    corporation representing southeastern Alaska).


    The act reserves a public access easement on the federal land conveyed to Cape Fox and
    Sealaska.'
  summary_version: Public Law
  summary_date: '2026-05-19'
  summary_truncated: false
- law_number: 119-92
  title: Investing in All of America Act of 2025
  bill: HR 2066
  enacted_date: '2026-05-19'
  origin_chamber: House
  sponsor:
    bioguide: M001204
    name: Rep. Meuser, Daniel [R-PA-9]
  url: https://www.congress.gov/bill/119th-congress/house-bill/2066
  summary: 'Investing in All of America Act of 2025


    This bill modifies the limit on the amount of financing available to a Small Business
    Investment Company (SBIC) from the Small Business Administration (SBA). It also expands
    the definition of private capital with respect to SBICs.


    Specifically, the bill reduces the maximum outstanding financing available to an SBIC
    from 300% to 200% of the SBIC''s private capital. The bill increases from $350 million
    to $475 million the maximum financing available to two or more commonly controlled SBICs
    that make quarterly or semiannual interest payments.


    The bill also expands the amounts that may be excluded from the calculation of the financing
    limit to include the amounts an SBIC invests in (1) rural areas, (2) certain technology
    categories, or (3) small manufacturers. The bill revises the cap on such excluded amounts
    to the lesser of $125 million or the aggregate of 50% of the private capital of the SBIC.


    Additionally, the bill expands what is considered the private capital of an SBIC to include
    funds obtained from the business revenue of additional government-sponsored corporations
    and funds invested by the trust or endowment of a college or university.'
  summary_version: Reported to House
  summary_date: '2025-08-15'
  summary_truncated: false
- law_number: 119-91
  title: Sloan Canyon Conservation and Lateral Pipeline Act
  bill: HR 972
  enacted_date: '2026-05-19'
  origin_chamber: House
  sponsor:
    bioguide: T000468
    name: Rep. Titus, Dina [D-NV-1]
  url: https://www.congress.gov/bill/119th-congress/house-bill/972
  summary: 'Sloan Canyon Conservation and Lateral Pipeline Act


    This act expands the boundaries of the Sloan Canyon National Conservation Area in Clark
    County, Nevada, and grants rights-of-way through the conservation area and other land
    administered by the Bureau of Land Management (BLM) for the construction of a water transmission
    pipeline and related facilities.


    Specifically, the act requires the BLM to grant certain rights-of-way to the Southern
    Nevada Water Authority (SNWA) for the purposes of (1) performing geotechnical investigations
    within the rights-of-way, and (2) constructing and operating a water pipeline and related
    facilities.


    The rights-of-way may not be located through or under areas designated as wilderness,
    and construction of the pipeline may not permanently adversely affect surface resources
    within the conservation area. The BLM may place other reasonable terms and conditions
    on the issuance of rights-of-way as necessary to protect the conservation area’s resources.


    In tunneling the water pipeline, SNWA may excavate and dispose of sand, gravel, minerals,
    and other materials as needed. The BLM must enter into a memorandum of understanding with
    SNWA to identify federal land on which SNWA may dispose of such materials.


    The act also adds approximately 9,290 acres of land to the conservation area. This expansion
    of the conservation area is subject to valid existing rights (e.g., utility transmission
    rights), must not preclude authorized activities within existing rights-of-way or corridors,
    and must not preclude the BLM from authorizing new utility rights-of-way.'
  summary_version: Public Law
  summary_date: '2026-05-19'
  summary_truncated: false
