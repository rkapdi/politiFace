            tier: standard
            sources: [F, A]
            coverage: concept
          - id: exec.treaty-power
            prompt: Treaty-making — President negotiates, Senate ratifies (2/3 vote)
            tier: standard
            sources: [F, A]
            coverage: concept
          - id: exec.appointments
            prompt: Appointment power — judges, ambassadors, agency heads (Senate confirms)
            tier: standard
            sources: [A, I]
            coverage: concept

      - id: executive.bureaucracy
        title: Federal Bureaucracy
        items:
          - id: exec.bureaucracy-basics
            prompt: Federal bureaucracy — agencies, rule-making, discretionary authority
            tier: standard
            sources: [A, N]
            coverage: concept

  # ── JUDICIAL ─────────────────────────────────────────────────────────────
  - id: judicial
    title: Judicial
    color: civicGreen
    concept_nodes:

      - id: judicial.scotus-role
        title: Supreme Court
        items:
          - id: jud.scotus-basics
            prompt: Supreme Court — highest court, 9 justices, current Chief Justice
            tier: core
            sources: [U, F, I]
            coverage: face_card  # us-judicial-scotus.yaml
