            tier: core
            sources: [U, F, A]
            coverage: concept
          - id: leg.elastic-clause
            prompt: Necessary and Proper (Elastic) Clause — implied powers
            tier: standard
            sources: [F, A]
            coverage: concept
          - id: leg.commerce-clause
            prompt: Commerce Clause — federal regulation of interstate commerce (McCulloch v. Maryland)
            tier: standard
            sources: [F, A]
            coverage: concept
          - id: leg.power-of-purse
            prompt: Power of the purse — Congress controls federal spending
            tier: standard
            sources: [A, I]
            coverage: concept
          - id: leg.oversight
            prompt: Congressional oversight — investigations, hearings, subpoenas
            tier: standard
            sources: [A, N]
            coverage: concept

      - id: legislative.process
        title: Lawmaking Process
        items:
          - id: leg.bill-to-law
            prompt: How a bill becomes a law — introduction → committee → floor → conference → president
            tier: core
            sources: [F, A, I]
            coverage: concept
          - id: leg.committees
            prompt: Committee system — markup, reporting, jurisdiction
            tier: standard
            sources: [A, I]
            coverage: concept
          - id: leg.impeachment
            prompt: Impeachment — House charges, Senate tries, Chief Justice presides for President
            tier: core
            sources: [F, A, I]
            coverage: concept
