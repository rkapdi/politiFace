# Politiface — US Civics Curriculum (v1)
#
# Single source of truth for the civics-literacy curriculum that powers
# BOTH the learn-tab map (via `concept_nodes`) and the trivia question
# picker (via `curriculum_items`, sampled for coverage-over-time guarantees).
#
# Built by consolidating five canonical sources:
#   U = USCIS 2008 Naturalization Test (100 questions)
#   F = Florida Civic Literacy Exam (FCLE)
#   A = AP US Government and Politics (College Board CED)
#   N = NAEP Civics Framework (Nation's Report Card)
#   I = iCivics / representative 8th-grade state standards
#
# Tiers:
#   core      — appears in 3+ sources; non-negotiable for v1
#   standard  — appears in 2 sources; v1 if room, v1.1 otherwise
#   (nice-to-have items deferred — re-introduce when we expand to specialized
#    audiences like AP students or FCLE-specific Florida cohort)
#
# Coverage tag:
#   face_card     — already taught by an existing face-card deck (avoid duplicate authorship)
#   concept       — needs a concept-flashcard set (NEW work)
#   mixed         — partial face-card coverage + needs supplementary concept content
#
# IDs use kebab-case prefixed with branch slug + topic slug.

version: 1
locale: en-US

# ── Chapters (player-facing curated path) ──────────────────────────────────
# Players experience the curriculum as a linear "season" of 6 chapters.
# Each chapter pulls items from MULTIPLE branches — chapters narrate a
# story, branches organize content. The home screen shows one chapter at
# a time ("Today's Round: Chapter 2 · The Architecture · Day 4 of 7").
#
# Pacing: chapter_days = ceil(unique_items / ~5 introduced per day). A
# season (all 6 chapters) takes ~18 days of daily play to walk through
# once. FSRS reinforcement of past chapters layers in automatically, so
# the daily round mixes ~70% current-chapter items + ~30% spaced review.

season:
  id: us-civics-season-1
  title: "Season One: Civic Foundations"
  subtitle: "From the Declaration to your ballot."
  total_chapters: 6
  estimated_days: 18

chapters:

  - id: ch1.first-principles
    order: 1
    title: The Founding
    subtitle: Declaration, founders, Constitution origin.
    days: 2
    item_ids:
      - decl.purpose
      - decl.unalienable-rights
      - founders.washington
      - founders.jefferson-madison-franklin-hamilton
      - const.we-the-people
      - const.convention-1787
      - const.articles-of-confederation
    lessons:
      - id: les-ch1-declaration
        day: 1
        title: "Why a Declaration?"
        body: >
          On July 4, 1776, the Continental Congress adopted the Declaration
          of Independence, announcing the thirteen colonies' separation from
          Great Britain. Thomas Jefferson was its principal author. It lists
          grievances against King George III and explains why the colonies
          were breaking away.
        related_cards: [decl.purpose]
        source: "https://www.archives.gov/founding-docs/declaration"
      - id: les-ch1-rights
        day: 1
        title: "Life, Liberty, and the Pursuit of Happiness"
        body: >
          The Declaration rests on a claim about rights: all people are
          created equal and hold unalienable rights — among them life,
          liberty, and the pursuit of happiness. Governments exist to secure
          those rights and derive their just powers from the consent of the
          governed.
        related_cards: [decl.unalienable-rights]
        source: "https://www.archives.gov/founding-docs/declaration-transcript"
      - id: les-ch1-founders
        day: 1
        title: "The People Who Built It"
        body: >
          George Washington commanded the Continental Army and later became
          the first President. Thomas Jefferson drafted the Declaration.
          James Madison earned the name Father of the Constitution. Benjamin
          Franklin was the Convention's elder statesman; Alexander Hamilton
          co-wrote the Federalist Papers that argued for ratification.
        related_cards: [founders.washington, founders.jefferson-madison-franklin-hamilton]
        source: "https://www.archives.gov/founding-docs/founding-fathers"
      - id: les-ch1-articles
        day: 2
        title: "The First Try Failed"
        body: >
          America's first framework, the Articles of Confederation, made the
          central government deliberately weak: Congress could not tax, there
          was no executive, and amending anything required unanimous consent.
          Economic disarray and Shays' Rebellion exposed the weaknesses and
          pushed leaders toward a new design.
        related_cards: [const.articles-of-confederation]
        source: "https://www.archives.gov/milestone-documents/articles-of-confederation"
      - id: les-ch1-convention
        day: 2
        title: "Philadelphia, 1787"
        body: >
          Delegates met in Philadelphia to revise the Articles — and instead
          wrote a new Constitution. Washington presided over the Convention.
          The finished document was signed on September 17, 1787, and sent to
          the states, where the ratification debate played out partly through
          the Federalist Papers.
        related_cards: [const.convention-1787]
        source: "https://www.archives.gov/milestone-documents/constitution"
      - id: les-ch1-preamble
        day: 2
        title: "We the People"
        body: >
          The Constitution opens by naming its source of authority — the
          people. The Preamble then states six purposes: a more perfect
          union, justice, domestic tranquility, common defense, the general
          welfare, and the blessings of liberty for ourselves and posterity.
        related_cards: [const.we-the-people]
        source: "https://www.archives.gov/founding-docs/constitution-transcript"

  - id: ch2.the-architecture
    order: 2
    title: The Constitution
    subtitle: Bill of Rights, separation of powers, federalism.
    days: 3
    item_ids:
      - const.supreme-law
      - const.amendment-process
      - prin.separation-of-powers
      - prin.checks-and-balances
      - prin.federalism
      - prin.enumerated-reserved-concurrent
      - prin.limited-government
      - prin.rule-of-law
      - bor.what-and-why
      - bor.first-amendment
      - bor.second-amendment
      - fed.papers-overview
      - fed.10-factions
      - fed.51-separation

    lessons:
      - id: les-ch2-supreme-law
        day: 1
        title: "The Supreme Law of the Land"
        body: >
          Article VI makes the Constitution supreme: every federal and state
          law, and every officer of government, is bound by it. When a law
          conflicts with the Constitution, the Constitution wins. Everything
          else in this chapter flows from that rule.
        related_cards: [const.supreme-law]
        source: "https://constitution.congress.gov/constitution/article-6/"
      - id: les-ch2-separation
        day: 1
        title: "Three Branches, Three Jobs"
        body: >
          The Constitution splits power so no one holds it all: Congress
          makes laws, the President enforces them, the courts interpret
          them. Then it arms each branch against the others — vetoes,
          overrides, confirmations, judicial review, impeachment. Power
          checks power.
        related_cards: [prin.separation-of-powers, prin.checks-and-balances]
        source: "https://constitution.congress.gov/browse/"
      - id: les-ch2-federalism
        day: 2
        title: "Two Levels of Government"
        body: >
          Federalism divides power between the nation and the states. The
          federal government holds the powers the Constitution grants it;
          the Tenth Amendment reserves the rest to the states or the
          people. Some powers, like taxing, are shared by both levels.
        related_cards: [prin.federalism]
        source: "https://constitution.congress.gov/constitution/amendment-10/"
      - id: les-ch2-amendments
        day: 2
        title: "A Constitution That Can Change"
        body: >
          Article V lets the Constitution be amended — but deliberately
          makes it hard: two-thirds of both chambers to propose, three-
          fourths of the states to ratify. In over two centuries, only 27
          amendments have cleared that bar.
        related_cards: [const.amendment-process]
        source: "https://constitution.congress.gov/constitution/article-5/"
      - id: les-ch2-bill-of-rights
        day: 3
        title: "The Bill of Rights"
        body: >
          Several states would only ratify the Constitution with a promise:
          explicit protections for individual liberty. The first ten
          amendments, ratified in 1791, deliver it — starting with the
          First Amendment's five freedoms: religion, speech, press,
          assembly, and petition.
        related_cards: [bor.what-and-why, bor.first-amendment]
        source: "https://www.archives.gov/founding-docs/bill-of-rights"
      - id: les-ch2-federalist
        day: 3
        title: "Selling the Constitution"
        body: >
          Ratification was a fight. Hamilton, Madison, and Jay wrote 85
          essays as "Publius" — the Federalist Papers — arguing the new
          design would control factions (No. 10) and make ambition counter
          ambition (No. 51). Courts still cite them today.
        related_cards: [fed.papers-overview]
        source: "https://guides.loc.gov/federalist-papers"

  - id: ch3.three-branches
    order: 3
    title: Three Branches
    subtitle: Congress, President, Supreme Court — who's in each.
    days: 3
    item_ids:
      - leg.bicameral
      - leg.senate-basics
      - leg.house-basics
      - leg.speaker
      - exec.president-basics
      - exec.vp-succession
      - exec.cabinet
      - exec.eop
      - jud.scotus-basics
      - jud.court-hierarchy
      - jud.lifetime-tenure
      - fed.70-executive
      - fed.78-judiciary

    lessons:
      - id: les-ch3-congress
        day: 1
        title: "Congress: Two Chambers"
        body: >
          Article I gives all federal lawmaking power to a bicameral
          Congress. The House — 435 seats divided by population, elected
          every two years — is built for responsiveness. The Senate — two
          per state for six-year terms — is built for deliberation. Both
          must pass identical text before a bill reaches the President.
        related_cards: [leg.bicameral, leg.house-basics]
        source: "https://www.congress.gov/about"
      - id: les-ch3-senate
        day: 1
        title: "Why Two Senators Per State?"
        body: >
          The Connecticut Compromise of 1787 settled the fight between
          large and small states: the House uses proportional
          representation, the Senate gives every state two votes. Wyoming
          has the same Senate power as California. The Senate alone
          confirms appointments, ratifies treaties, and tries impeachments.
        related_cards: [leg.senate-basics]
        source: "https://www.senate.gov/about/origins-foundations/senate-and-constitution.htm"
      - id: les-ch3-president
        day: 2
        title: "The Presidency"
        body: >
          Head of state and head of government, elected every four years,
          capped at two terms. The President commands the military, signs
          or vetoes every bill, issues executive orders, grants federal
          pardons, and conducts foreign policy — but cannot declare war.
          That power belongs to Congress.
        related_cards: [exec.president-basics]
        source: "https://constitution.congress.gov/constitution/article-2/"
      - id: les-ch3-cabinet
        day: 2
        title: "The Cabinet and the Line of Succession"
        body: >
          Fifteen department secretaries advise the President and run the
          federal agencies — appointed by the President, confirmed by the
          Senate. If the President cannot serve, the 25th Amendment sends
          power to the Vice President; the Speaker of the House is next.
        related_cards: [exec.cabinet, exec.vp-succession]
        source: "https://www.whitehouse.gov/administration/cabinet/"
      - id: les-ch3-scotus
        day: 3
        title: "The Supreme Court"
        body: >
          Nine justices, nominated by the President, confirmed by the
          Senate, serving for life. The Court's biggest power — striking
          down laws as unconstitutional — appears nowhere in the
          Constitution. It comes from Marbury v. Madison (1803), and it
          made the judiciary a co-equal branch.
        related_cards: [jud.scotus-basics, jud.lifetime-tenure]
        source: "https://www.supremecourt.gov/about/about.aspx"
      - id: les-ch3-filibuster
        day: 3
        title: "The Filibuster"
        body: >
          In the Senate, any senator can delay a vote by refusing to yield
          the floor. Ending debate — cloture — takes 60 votes, which gives
          the minority real blocking power. Budget bills move under
          reconciliation rules and need only a simple majority.
        related_cards: [leg.senate-basics]
        source: "https://www.senate.gov/about/powers-procedures/filibusters-cloture.htm"

  - id: ch4.machine-in-motion
    order: 4
    title: How Laws Get Made
    subtitle: From bill to vote to veto to law.
    days: 3
    item_ids:
      - leg.enumerated-powers
      - leg.elastic-clause
      - leg.commerce-clause
