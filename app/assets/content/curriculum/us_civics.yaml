# ── Coverage summary ───────────────────────────────────────────────────────
# Concept nodes:      18  (5 Foundations, 3 Legislative, 3 Executive,
#                          4 Judicial, 3 State-Local rolled up as branches)
# Curriculum items:   71  (30 core + 41 standard)
# Already face-card:  10  (existing decks cover these; no new authoring needed)
# Needs concept-deck: 61  (the actual content-authoring backlog for v1)
#
# The trivia question picker samples from `curriculum_items` with
# coverage-over-time bias: prefer items the user has touched least, weighted
# by tier (core 3x, standard 1x). This guarantees that a daily player has
# seen every CORE item within ~30 days and every STANDARD item within ~90.
