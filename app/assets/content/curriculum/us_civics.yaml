# Politiface — US Civics Curriculum (v1)
#
# Single source of truth for the civics-literacy curriculum that powers
# BOTH the learn-tab map (via `concept_nodes`) and the trivia question
# picker (via `curriculum_items`, sampled for coverage-over-time guarantees).
#
# Built by consolidating five canonical sources:
#   U = USCIS 2008 Naturalization Test (100 questions)
#   F = Florida Civic Literacy Exam (FCLE)
#   A = AP US Government and Politics (College Board CED)
#   N = NAEP Civics Framework (Nation's Report Card)
#   I = iCivics / representative 8th-grade state standards
#
# Tiers:
#   core      — appears in 3+ sources; non-negotiable for v1
#   standard  — appears in 2 sources; v1 if room, v1.1 otherwise
#   (nice-to-have items deferred — re-introduce when we expand to specialized
#    audiences like AP students or FCLE-specific Florida cohort)
#
# Coverage tag:
#   face_card     — already taught by an existing face-card deck (avoid duplicate authorship)
#   concept       — needs a concept-flashcard set (NEW work)
#   mixed         — partial face-card coverage + needs supplementary concept content
#
# IDs use kebab-case prefixed with branch slug + topic slug.

version: 1
locale: en-US

# ── Chapters (player-facing curated path) ──────────────────────────────────
# Players experience the curriculum as a linear "season" of 6 chapters.
# Each chapter pulls items from MULTIPLE branches — chapters narrate a
# story, branches organize content. The home screen shows one chapter at
# a time ("Today's Round: Chapter 2 · The Architecture · Day 4 of 7").
#
# Pacing: chapter_days = ceil(unique_items / ~5 introduced per day). A
# season (all 6 chapters) takes ~18 days of daily play to walk through
# once. FSRS reinforcement of past chapters layers in automatically, so
# the daily round mixes ~70% current-chapter items + ~30% spaced review.

season:
  id: us-civics-season-1
  title: "Season One: Civic Foundations"
  subtitle: "From the Declaration to your ballot."
  total_chapters: 6
  estimated_days: 18

chapters:

  - id: ch1.first-principles
    order: 1
    title: The Founding
    subtitle: Declaration, founders, Constitution origin.
    days: 2
    item_ids:
      - decl.purpose
      - decl.unalienable-rights
      - founders.washington
      - founders.jefferson-madison-franklin-hamilton
      - const.we-the-people
      - const.convention-1787
      - const.articles-of-confederation

  - id: ch2.the-architecture
    order: 2
    title: The Constitution
    subtitle: Bill of Rights, separation of powers, federalism.
    days: 3
    item_ids:
      - const.supreme-law
      - const.amendment-process
      - prin.separation-of-powers
      - prin.checks-and-balances
      - prin.federalism
      - prin.enumerated-reserved-concurrent
      - prin.limited-government
      - prin.rule-of-law
      - bor.what-and-why
      - bor.first-amendment
      - bor.second-amendment
      - fed.papers-overview
      - fed.10-factions
      - fed.51-separation

  - id: ch3.three-branches
    order: 3
    title: Three Branches
    subtitle: Congress, President, Supreme Court — who's in each.
    days: 3
    item_ids:
      - leg.bicameral
      - leg.senate-basics
      - leg.house-basics
      - leg.speaker
      - exec.president-basics
      - exec.vp-succession
      - exec.cabinet
      - exec.eop
      - jud.scotus-basics
      - jud.court-hierarchy
      - jud.lifetime-tenure
      - fed.70-executive
      - fed.78-judiciary

  - id: ch4.machine-in-motion
    order: 4
    title: How Laws Get Made
    subtitle: From bill to vote to veto to law.
    days: 3
    item_ids:
      - leg.enumerated-powers
      - leg.elastic-clause
      - leg.commerce-clause
      - leg.power-of-purse
      - leg.oversight
      - leg.bill-to-law
      - leg.committees
      - leg.impeachment
      - exec.commander-in-chief
      - exec.veto
      - exec.executive-orders
      - exec.treaty-power
      - exec.appointments
      - exec.bureaucracy-basics
      - jud.judicial-review

  - id: ch5.rights-and-the-court
    order: 5
    title: Your Rights
    subtitle: Free speech, due process, landmark Supreme Court cases.
    days: 3
    item_ids:
      - case.marbury
      - case.mcculloch
      - case.brown
      - case.plessy
      - case.gideon
      - case.engel
      - case.tinker
      - case.schenck
      - case.nyt-us
      - case.yoder
      - case.roe-dobbs
      - case.citizens-united
      - doc.incorporation
      - cr.movement

  - id: ch6.we-the-people
    order: 6
    title: Voting & You
    subtitle: Parties, elections, civic duty, civil rights.
    days: 4
    item_ids:
      - sl.governor
      - sl.state-powers
      - sl.federalism-practice
      - sl.local-structures
      - part.two-parties
      - part.third-parties
      - part.ideology
      - vote.eligibility
      - vote.registration-turnout
      - vote.presidential-cycle
      - camp.interest-groups
      - camp.finance
      - media.role
      - civ.duties
      - civ.citizen-rights
      - cr.landmark-legislation
      - sym.flag
      - sym.anthem
      - geo.essentials
      - leg.gerrymandering

# ── Map structure ──────────────────────────────────────────────────────────
# Top-level branches mirror the existing learn-tab map. `Foundations` is
# new. Each branch lists concept_nodes that will render in the map ALONGSIDE
# existing face-card nodes (which live in /app/assets/content/decks/).

branches:

  # ── FOUNDATIONS (new top-level branch) ─────────────────────────────────
  - id: foundations
    title: Foundations
    color: ochre
    description: >
      The founding documents, principles, and architecture of American
      democracy. Where the system gets its legitimacy and shape.
    concept_nodes:

      - id: foundations.constitution
        title: The Constitution
        items:
          - id: const.supreme-law
            prompt: The Constitution is the supreme law of the land
            tier: core
            sources: [U, F, A, N, I]
            coverage: concept
          - id: const.we-the-people
            prompt: "'We the People' — popular sovereignty and self-government"
            tier: core
            sources: [U, F, N, I]
            coverage: concept
          - id: const.convention-1787
            prompt: Constitutional Convention (1787) — Philadelphia, replaced the Articles
            tier: core
            sources: [U, F, A]
            coverage: concept
          - id: const.articles-of-confederation
            prompt: Articles of Confederation — first US government and why it failed
            tier: core
            sources: [F, A, I]
            coverage: concept
          - id: const.amendment-process
            prompt: How the Constitution is amended (Article V)
            tier: standard
            sources: [A, I]
            coverage: concept

      - id: foundations.declaration
        title: Declaration of Independence
        items:
          - id: decl.purpose
            prompt: Declaration of Independence — purpose, author (Jefferson), date (July 4, 1776)
            tier: core
            sources: [U, F, A, I]
            coverage: concept
          - id: decl.unalienable-rights
            prompt: Unalienable rights — life, liberty, pursuit of happiness
            tier: core
            sources: [U, F, A]
            coverage: concept

      - id: foundations.bill-of-rights
        title: Bill of Rights
        items:
          - id: bor.what-and-why
            prompt: The Bill of Rights — first 10 amendments and why they were added
            tier: core
            sources: [U, F, A, N, I]
            coverage: concept
          - id: bor.first-amendment
            prompt: First Amendment — speech, religion, press, assembly, petition
            tier: core
            sources: [U, F, A, I]
            coverage: concept
          - id: bor.second-amendment
            prompt: Second Amendment — right to bear arms (DC v. Heller, McDonald v. Chicago)
            tier: standard
            sources: [F, A]
            coverage: concept

      - id: foundations.federalist-papers
        title: Federalist Papers
        items:
          - id: fed.papers-overview
            prompt: Federalist Papers — purpose (ratify the Constitution); Hamilton, Madison, Jay
            tier: core
            sources: [F, A, I]
            coverage: concept
          - id: fed.10-factions
            prompt: Federalist 10 — Madison on factions and the large republic remedy
            tier: standard
            sources: [F, A]
            coverage: concept
          - id: fed.51-separation
            prompt: Federalist 51 — "ambition counteracting ambition" / separation of powers
            tier: standard
            sources: [F, A]
            coverage: concept
          - id: fed.70-executive
            prompt: Federalist 70 — Hamilton on the energetic single executive
            tier: standard
            sources: [F, A]
            coverage: concept
          - id: fed.78-judiciary
            prompt: Federalist 78 — Hamilton on judicial review and the "least dangerous branch"
            tier: standard
            sources: [F, A]
            coverage: concept

      - id: foundations.principles
        title: Foundational Principles
        items:
          - id: prin.rule-of-law
            prompt: Rule of law — no one is above the law
            tier: core
            sources: [U, F, N]
            coverage: concept
          - id: prin.separation-of-powers
            prompt: Separation of powers — the three branches divide authority
            tier: core
            sources: [U, F, A, N, I]
            coverage: concept
          - id: prin.checks-and-balances
            prompt: Checks and balances — each branch limits the others
            tier: core
            sources: [U, F, A, N, I]
            coverage: concept
          - id: prin.federalism
            prompt: Federalism — division of power between national and state governments
            tier: core
            sources: [U, F, A, N, I]
            coverage: concept
            cross_links: [state-local.federalism-practice]
          - id: prin.enumerated-reserved-concurrent
            prompt: Enumerated, reserved, and concurrent powers
            tier: core
            sources: [U, F, A]
            coverage: concept
          - id: prin.limited-government
            prompt: Limited government — constitutional constraints on state power
            tier: core
            sources: [F, A, N]
            coverage: concept

      - id: foundations.founders
        title: The Founders
        items:
          - id: founders.washington
            prompt: George Washington — first president, Constitutional Convention president
            tier: core
            sources: [U, F, A, I]
            coverage: concept
          - id: founders.jefferson-madison-franklin-hamilton
            prompt: Jefferson, Madison, Franklin, Hamilton — roles in founding
            tier: core
            sources: [U, F, A, I]
            coverage: concept

  # ── LEGISLATIVE ──────────────────────────────────────────────────────────
  - id: legislative
    title: Legislative
    color: civicNavy
    concept_nodes:

      - id: legislative.congress-structure
        title: Congress — Structure
        items:
          - id: leg.bicameral
            prompt: Congress has two chambers — Senate and House of Representatives
            tier: core
            sources: [U, F, A, N, I]
            coverage: face_card  # us-legislative-congress.yaml
          - id: leg.senate-basics
            prompt: 100 Senators (2 per state), 6-year terms
            tier: core
            sources: [U, I]
            coverage: face_card  # us-legislative-senate.yaml
          - id: leg.house-basics
            prompt: 435 House members, 2-year terms, apportioned by state population
            tier: core
            sources: [U, F, I]
            coverage: face_card  # us-legislative-house.yaml
          - id: leg.speaker
