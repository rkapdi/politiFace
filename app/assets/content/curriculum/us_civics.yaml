            tier: standard
            sources: [A, I]
            coverage: face_card  # us-executive-eop.yaml

      - id: executive.powers
        title: Executive Powers
        items:
          - id: exec.commander-in-chief
            prompt: Commander-in-Chief — power over the military
            tier: core
            sources: [U, F, A]
            coverage: concept
          - id: exec.veto
            prompt: Veto and pocket veto; Congress can override with 2/3 vote
