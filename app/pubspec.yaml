name: politiface
description: Global political literacy platform.
version: 1.1.0+4
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Local database (offline-first) ────────────────────────────────────────
  drift: ^2.20.2
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── Remote backend ────────────────────────────────────────────────────────
  supabase_flutter: ^2.6.0

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Images ───────────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1

  # ── Connectivity ─────────────────────────────────────────────────────────
  connectivity_plus: ^6.0.3

  # ── Notifications ────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  # (firebase_core + firebase_messaging restored when push notifications land)

  # ── Analytics + error monitoring ─────────────────────────────────────────
  sentry_flutter: ^8.8.0
  # (posthog_flutter restored when analytics events get wired)

  # ── UI utilities ─────────────────────────────────────────────────────────
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  confetti: ^0.7.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  intl: ^0.19.0

  # ── Env / config ─────────────────────────────────────────────────────────
  flutter_dotenv: ^5.2.1

  # ── Build metadata ───────────────────────────────────────────────────────
  package_info_plus: ^8.0.0

  # ── Data structures ───────────────────────────────────────────────────────
  collection: ^1.18.0         # HeapPriorityQueue for session queue

  # ── Content parsing ──────────────────────────────────────────────────────
  yaml: ^3.1.3

  # ── Secure storage (auth tokens) ─────────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ── Code generation ───────────────────────────────────────────────────────
  drift_dev: ^2.20.2
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  ios: true
  android: false  # iOS-only V1
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/content/decks/
    - assets/content/curriculum/
    - assets/content/atlas/
    - assets/portraits/

  # TODO: re-enable once asset files and .env exist (see handoff Section 14)
  # assets:
  #   - .env
  #   - assets/images/offline_cards/   # Tier 1 bundled photos
  #   - assets/images/map_icons/        # Government map node icons
  #   - assets/fonts/
