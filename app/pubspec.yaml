name: politiface
description: Global political literacy platform.
version: 1.2.0+11
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Local database (offline-first; the only persistence layer) ────────────
  drift: ^2.20.2
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Images ───────────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1

  # ── Notifications (local daily reminder only) ────────────────────────────
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # ── Crash reporting (opt-in, the app's only telemetry) ───────────────────
  sentry_flutter: ^8.8.0

  # ── Sound effects (synthesized UI sounds; see scripts/generate_sounds.py) ─
  audioplayers: ^6.1.0

  # ── UI utilities ─────────────────────────────────────────────────────────
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.0

  # ── Build metadata ───────────────────────────────────────────────────────
  package_info_plus: ^8.0.0

  # ── Data structures ───────────────────────────────────────────────────────
  collection: ^1.18.0         # HeapPriorityQueue for session queue

  # ── Content parsing ──────────────────────────────────────────────────────
  yaml: ^3.1.3
  crypto: ^3.0.3            # SHA-256 content checksums drive re-seeding

  # ── Typography ────────────────────────────────────────────────────────────
  google_fonts: ^6.3.0
  supabase_flutter: ^2.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  sqlite3: ^2.4.0             # raw DB fixtures in migration tests

  # ── Code generation ───────────────────────────────────────────────────────
  drift_dev: ^2.20.2
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  ios: true
  android: false  # iOS-only V1
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/content/decks/
    - assets/content/curriculum/
    - assets/content/atlas/
    # Bundled copy of content/governments/us/government.yaml (the canonical
    # source). CI fails if the two files differ — see content-ci workflow.
    - assets/content/governments/us/
    - assets/content/questions/
    # Bundled copy of content/fcle/objectives.yaml (the 32-objective FCLE
    # taxonomy). CI fails if the two files differ — see content-ci workflow.
    - assets/content/fcle/
    - assets/content/people/
    - assets/content/portraits/congress/
    - assets/portraits/
    # Synthesized UI sound effects, generated by scripts/generate_sounds.py.
    - assets/audio/
