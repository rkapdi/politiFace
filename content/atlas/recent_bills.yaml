- bill: S 1367
  congress: 119
  title: NO FAKES Act of 2025
  action_date: '2025-04-09'
  action: Read twice and referred to the Committee on the Judiciary.
  origin_chamber: Senate
  url: https://www.congress.gov/bill/119th-congress/senate-bill/1367
  summary: 'Nurture Originals, Foster Art, and Keep Entertainment Safe Act of 2025 or the
    NO FAKES Act of 2025


    This bill creates a federal intellectual property right to protect individuals from unauthorized
    digital replicas (e.g., digital content made using generative artificial intelligence)
    of their voice and visual likeness.


    Specifically, the bill gives each individual or right holder the right to authorize the
    use of the individual''s voice or visual likeness (1) in a digital replica, or (2) for
    a product or service requiring authorization to avoid liability under the bill. This property
    right is not assignable during the individual’s lifetime but is licensable and does not
    expire upon the death of the individual.


    Generally, any individual or entity that engages in specified prohibited activities (e.g.,
    distributing a digital replica without authorization) shall be liable in a civil action
    and subject to related penalties. The bill exempts specified uses from liability, such
    as categories of conduct likely to involve protected speech under the First Amendment
    (e.g., news reporting, sports broadcasts, and satire).


    The bill establishes a notice-and-takedown process for unauthorized digital replicas.
    The bill establishes penalties related to false or deceptive notice.


    The bill expressly preempts state laws related to digital replicas except for causes of
    action under state statutes or common law in existence as of January 2, 2025.'
  summary_version: Introduced in Senate
  summary_date: '2025-04-09'
  summary_truncated: false
- bill: HR 1838
  congress: 119
  title: Broadband Internet for Small Ports Act
  action_date: '2025-03-28'
  action: Referred to the Subcommittee on Commodity Markets, Digital Assets, and Rural Development.
  origin_chamber: House
  url: https://www.congress.gov/bill/119th-congress/house-bill/1838
  summary: 'Broadband Internet for Small Ports Act


    This bill establishes priority for broadband projects near rural maritime ports under
    the Department of Agriculture (USDA) rural broadband grant and loan program, and makes
    other specified changes to the program’s structure and available support.


    Under current law, the rural broadband program provides grants, loans, and loan guarantees
    for the construction, improvement, and acquisition of broadband facilities and equipment
    in rural areas. The bill adjusts the level of priority given to certain categories of
    projects, including through the establishment of a new priority for projects that would
    increase broadband service in ports and shore-side facilities in rural areas.


    The bill also makes changes to the program’s parameters, including by changing available
    grant amounts and increasing the percentage of households in a community that must be
    unserved or underserved with broadband in order for projects in the community to qualify
    for loans or loan guarantees. Further, as a condition of receiving support, recipients
    must share with USDA geolocation information on new or upgraded broadband service established
    under the program.


    For proposed projects given high priority, the bill requires USDA to confirm that the
    relevant communities are currently unserved by conferring with relevant federal agencies
    and other broadband service data sources, and by performing site-specific testing to verify
    the unavailability of residential broadband service.


    Finally, the bill requires USDA to provide feedback and decisions to applicants in a timely
    manner, and to use certain program funds for oversight and accountability measures.'
  summary_version: Introduced in House
  summary_date: '2025-03-04'
  summary_truncated: false
- bill: S 726
  congress: 119
  title: Ethan's Law
  action_date: '2025-02-25'
  action: Read twice and referred to the Committee on the Judiciary.
  origin_chamber: Senate
  url: https://www.congress.gov/bill/119th-congress/senate-bill/726
  summary: 'Ethan''s Law


    This bill establishes a framework to regulate the storage of firearms on residential premises
    at the federal, state, and tribal levels.


    At the federal level, the bill establishes statutory requirements for firearms on residential
    premises to be safely stored if a minor is likely to gain access without permission or
    if a resident is ineligible to possess a firearm.


    An individual who violates the requirements is subject to criminal penalties. A firearm
    stored in violation of the requirements is subject to seizure and forfeiture.


    At the state and tribal levels, the bill requires the Department of Justice to award grants
    to implement functionally identical requirements for the safe storage of firearms.'
  summary_version: Introduced in Senate
  summary_date: '2025-02-25'
