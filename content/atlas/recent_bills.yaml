  title: To reauthorize and make improvements to Federal programs relating to the prevention,
    detection, and treatment of traumatic brain injuries, and for other purposes.
  action_date: '2026-07-20'
  action: Motion to reconsider laid on the table Agreed to without objection.
  origin_chamber: House
  url: https://www.congress.gov/bill/119th-congress/house-bill/1493
  summary: 'This bill reauthorizes from FY2026-FY2030 and expands Department of Health and
    Human Services (HHS) programs relating to traumatic brain injuries. It also requires HHS
    to conduct a study and report to Congress on traumatic brain injuries.


    Specifically, the bill reauthorizes


    Centers for Disease Control and Prevention (CDC) grants to states for traumatic brain
    injury surveillance and registries (renaming the program after the late Representative
    Bill Pascrell, Jr.),


    CDC research and public awareness activities to reduce traumatic brain injuries,


    Administration for Community Living (ACL) grants to states and American Indian consortiums
    for services and support for individuals living with traumatic brain injuries, and


    ACL grants for protection and advocacy agencies supporting individuals with traumatic
    brain injuries.


    Also, the bill generally expands the scope and requirements of these programs, including
    by requiring the CDC to publish information on populations at higher risk for traumatic
    brain injuries and strategies for preventing such injuries in these populations.


    Additionally, HHS must conduct a study on long-term symptoms or conditions in people who
    experience traumatic brain injuries and report the findings to Congress. HHS must also
    submit a report to Congress on populations with a higher risk of traumatic brain injuries
    and outreach efforts for such populations.'
