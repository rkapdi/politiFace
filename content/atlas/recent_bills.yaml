  origin_chamber: House
  url: https://www.congress.gov/bill/119th-congress/house-bill/7283
  summary: 'Ensuring Federal Purchasing Efficiency Act


    This bill requires the Federal Acquisition Regulatory Council to adjust certain acquisition-related
    dollar thresholds for inflation every three years instead of every five years.


    For example, the federal government uses less complex procedures for the purchase of property
    and services valued below the simplified acquisition threshold. Under the bill, this threshold
    would be adjusted for inflation every three years.'
