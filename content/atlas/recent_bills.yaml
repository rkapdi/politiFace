- bill: HCONRES 113
  congress: 119
  title: Establishing the congressional budget for the United States Government for fiscal
    year 2027 and setting forth the appropriate budgetary levels for fiscal years 2028 through
    2036.
  action_date: '2026-07-20'
  action: Rules Committee Resolution H. Res. 1438 Reported to House. Rule provides for consideration
    of H.R. 8800, H.R. 8884, H. Con. Res. 113, H.R. 7008, H.R. 6955 and H.R. 9770. The resolution
    provides for consideration of H.R. 8800 under a structured rule and for consideration
    of H.R. 8884, H. Con. Res. 113, H.R. 7008, H.R. 6955, and H.R. 9770 under a closed rule,
    with one hour of debate on each measure and one motion to recommit H.R. 8800, H.R. 8844,
    H.R. 7008, H.R. 6955, and H.R. 9770.
  origin_chamber: House
  url: https://www.congress.gov/bill/119th-congress/house-concurrent-resolution/113
  summary: 'This concurrent resolution establishes the congressional budget for the federal
    government for FY2027, sets forth budgetary levels for FY2028-FY2036, and provides reconciliation
    instructions for legislation that increases the deficit.


    The resolution recommends levels and amounts for FY2027-FY2036 for


    federal revenues,


    new budget authority,


    budget outlays,


    deficits (on-budget),


    debt subject to limit,


    debt held by the public, and


    the major functional categories of spending.


    The resolution includes reconciliation instructions that direct the House Agriculture
    Committee, the House Armed Services Committee, the House Permanent Select Committee on
    Intelligence, and the House Administration Committee to submit recommendations for legislation
    that will increase the deficit over FY2027-FY2036 by not more than specified amounts.
    Each committee must submit the recommendations to the House Budget Committee by September
    11, 2026.


    (Under current law, reconciliation bills are considered by Congress using expedited legislative
    procedures that prevent a filibuster and restrict amendments in the Senate.)


    In addition, the resolution establishes a reserve fund that allows certain adjustments
    to committee allocations and other budgetary levels to accommodate reconciliation legislation.


    Finally, the resolution sets forth budget enforcement procedures that address issues such
    as


    adjustments to committee allocations and other budgetary levels,


    the budgetary treatment of the discretionary administrative expenses for the Social Security
    Administration and the U.S. Postal Service;


    emergency spending; and


    additional adjustments for disaster relief, wildfire suppression, health care fraud and
    abuse control, continuing disability reviews and redeterminations, and reemployment services
    and eligibility assessments.'
