  origin_chamber: Senate
  url: https://www.congress.gov/bill/119th-congress/senate-bill/4632
  summary: 'Prevent Government Shutdowns Act of 2026


    This bill provides continuing appropriations to prevent a government shutdown if the appropriations
    bills for a fiscal year have not been enacted before the fiscal year begins and continuing
    appropriations are not in effect.


    Specifically, the bill provides appropriations at the rate of operations that was provided
    for the prior fiscal year to continue programs, projects, and activities that were funded
    in the preceding fiscal year.


    The bill also limits official travel, congressional recesses or adjournments, and the
    consideration of legislation that is unrelated to appropriations after the beginning of
    a fiscal year if the appropriations process has not been completed.'
