  url: https://www.congress.gov/bill/119th-congress/house-bill/2069
  summary: 'Stop Secret Spending Act of 2025


    This bill expands a requirement for federal agencies to report expenditures on the USAspending.gov
    website to include other transaction agreement expenditures. (Other transaction agreements,
    or OTAs, are contractual instruments other than standard procurement contracts, grants,
    or cooperative agreements; they are exempt from many federal procurement laws and regulations).


    Under current law, federal agencies must report expenditures on federal awards to USAspending.gov
    with the term federal award defined as federal grants, loans, cooperative agreements,
    contracts, and certain other types of expenditures. This bill expands the definition of
    federal award to include expenditures under OTAs, and therefore such expenditures must
    be included on the USAspending.gov website.


    The Department of the Treasury must ensure that data relating to OTAs are automatically
    transmitted to the website and a centralized view of this data is available on the website.
    Treasury must also annually post on the USAspending.gov website a report that includes
    (1) the total amount of federal spending on federal awards for which data has not been
    posted on the website, and (2) the reason why such spending data was not posted.


    For 10 years after enactment, the Office of Inspector General of specified federal agencies
    must periodically submit to Congress and make publicly available a report assessing the
    agency''s spending data and use of data standards.'
