- bill: S 1809
  congress: 119
  title: Drone Espionage Act
  action_date: '2026-02-09'
  action: Placed on Senate Legislative Calendar under General Orders. Calendar No. 316.
  origin_chamber: Senate
  url: https://www.congress.gov/bill/119th-congress/senate-bill/1809
  summary: 'Drone Espionage Act


    This bill makes it a federal crime under the Espionage Act to engage in certain activities
    related to obtaining, receiving, or transmitting video of national defense information.
    The term national defense information means information or other material that is related
    to national defense.


    The Espionage Act prohibits certain activities related to obtaining, receiving, or transmitting
    national defense information that could harm the United States or aid a foreign nation.
    Under current law, the prohibitions only apply if national defense information is obtained,
    received, or transmitted by certain means, such as a sketch, photograph, photographic
    negative, blueprint, plan, map, model, instrument, appliance, document, writing, or note.
    Under current law, a violator is subject to criminal penalties—a fine, a prison term of
    up to 10 years, or both.


    This bill makes the criminal prohibitions under the Espionage Act applicable if national
    defense information is obtained, received, or transmitted by means of video. Under this
    bill, a violator is subject to the same penalties as under existing law—a fine, a prison
    term of up to 10 years, or both.'
  summary_version: Reported to Senate
  summary_date: '2026-02-09'
