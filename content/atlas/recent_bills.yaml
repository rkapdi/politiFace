  origin_chamber: Senate
  url: https://www.congress.gov/bill/119th-congress/senate-bill/138
  summary: 'VA Home Loan Awareness Act of 2025


    This bill requires mortgage lenders to include on the Uniform Residential Loan Application
    (i.e., Fannie Mae Form 1003 or Freddie Mac Form 65) a notification that applicants with
    military service may qualify for a Department of Veterans Affairs Home Loan.


    Not later than 18 months after the enactment of the bill, the Government Accountability
    Office must study and report on whether at least 80% of lenders using the loan application
    form have met this requirement.'
