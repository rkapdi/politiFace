  summary: 'National Defense Authorization Act for Fiscal Year 2027


    This bill sets forth policies and authorities for FY2027 for Department of Defense (DOD)
    programs, activities, and military construction as well as the national security programs
    of the Department of Energy (DOE).


    Among other elements, the bill


    authorizes the procurement of various items, including aircraft and ships;


    sets active duty and reserve component personnel strength levels;


    sets policy regarding various aspects of military health care and military compensation;


    sets policy regarding DOD acquisitions and acquisition management, including contracting
    authorities and the acquisition workforce;


    sets policy for various matters related to DOD interactions with foreign nations, including
    matters concerning Israel, Europe, and the Indo-Pacific;


    sets policy for various matters related to DOD cybersecurity and artificial intelligence;


    requires DOD to include projected demand for foreign military sales in certain contexts,
    including munitions production planning, sustainment planning for major defense acquisition
    programs, and decisions regarding production rate increases of defense articles;


    requires DOD to establish an expedited qualification process for new domestic and allied
    sources of certain strategic materials, including specified metals, alloys, oxides, and
    magnets;


    authorizes specified military construction projects and extends the authorization of certain
    projects from previous fiscal years; and


    authorizes the National Nuclear Security Administration, Defense Nuclear Facilities Safety
    Board, Naval Petroleum Reserves, and Maritime Administration.


    For additional information on the National Defense Authorization Act (NDAA) see


    In Focus IF10516, Defense Primer: Navigating the NDAA, and


    In Focus IF10515, Defense Primer: The NDAA Process.'
  summary_version: Reported to House
  summary_date: '2026-06-15'
