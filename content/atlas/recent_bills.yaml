- bill: HR 8790
  congress: 119
  title: Next-Generation Geothermal Research and Development Act
  action_date: '2026-07-20'
  action: Motion to reconsider laid on the table Agreed to without objection.
  origin_chamber: House
  url: https://www.congress.gov/bill/119th-congress/house-bill/8790
  summary: 'Next-Generation Geothermal Research and Development Act


    This bill directs the Department of Energy (DOE) to support the development of next-generation
    geothermal systems, such as closed-loop geothermal systems in supercritical conditions.
    Specifically, the bill expands the Energy Independence and Security Act of 2007 to modify
    and establish geothermal energy programs, such as programs concerning research and development,
    grants, and data management.


    DOE must support a program of research, development, demonstration, and commercial application
    for next-generation geothermal systems. DOE may administer grants for carrying out certain
    focus areas of the program. DOE must also ensure that at least one Frontier Observatory
    for Research in Geothermal Energy (FORGE) field research site has the capabilities to
    include next-generation geothermal testing.


    Additionally, DOE must provide grants for (1) the continuation and expansion of research,
    development, demonstration, testing, and commercial application activities applicable
    to FORGE sites; and (2) the establishment of a next-generation geothermal systems center
    of excellence.


    DOE must also provide grants to accelerate the development, testing, and implementation
    of innovative technologies to improve the commercial-readiness of geothermal energy projects
    using next-generation geothermal systems.


    DOE must expand its repository of geothermal drilling information to include publicly
    available subsurface data, including data reported as part of fossil fuel and mining operations.
    DOE must also periodically update the repository to improve its functionality and usability.


    The bill authorizes the Department of the Interior to commission the drilling of supercritical
    geothermal exploration boreholes in certain areas to provide control points for deep heat
    mapping and geothermal development.'
