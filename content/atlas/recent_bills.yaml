  title: Tribal Access to Clean Water Act of 2025
  action_date: '2025-07-14'
  action: Read twice and referred to the Committee on Indian Affairs.
  origin_chamber: Senate
  url: https://www.congress.gov/bill/119th-congress/senate-bill/2272
  summary: 'Tribal Access to Clean Water Act of 2025


    This bill expands access to water resources for Indian tribes and Native Hawaiian communities.


    Under a current program, the Department of Agriculture (USDA) makes loans and grants to
    provide water and waste disposal facilities and services to low-income rural areas whose
    residents are facing significant health risks. This bill expands eligibility for the program
    to include Native Hawaiian organizations. Additionally, these loans and grants may be
    used to provide water or waste services to residents on tribal lands.


    The bill authorizes USDA to make additional loans and grants under existing programs to
    tribes and Native Hawaiian organizations to develop, use, and control water. The bill
    also allows USDA to support technical assistance for tribes and Native Hawaiian organizations.


    Additionally, the bill allows the Indian Health Service to (1) provide and maintain essential
    sanitation facilities for noncommercial community structures (e.g., schools, hospitals,
    and tribal offices), (2) provide technical assistance, and (3) provide financial assistance
    to operate and maintain drinking water and sanitation facilities serving tribes that are
    owned and operated by a tribe.


    The bill also increases the authorization of appropriations for the Bureau of Reclamation''s
    Native American Affairs Technical Assistance Program through FY2030.'
  summary_version: Introduced in Senate
  summary_date: '2025-07-14'
