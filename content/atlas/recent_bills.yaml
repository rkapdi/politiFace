- bill: HR 6294
  congress: 119
  title: Childhood Diabetes Reduction Act of 2025
  action_date: '2025-11-25'
  action: Referred to the House Committee on Energy and Commerce.
  origin_chamber: House
  url: https://www.congress.gov/bill/119th-congress/house-bill/6294
  summary: 'Childhood Diabetes Reduction Act of 2025


    This bill requires health warnings on labels and in advertisements for food and beverages
    that are sweetened, processed, or contain a high level of certain nutrients, and it prohibits
    specifically advertising such products to children. It also expands research and outreach
    on proper nutrition.


    The bill requires various Food and Drug Administration (FDA) warnings on labels for (1)
    sugar-sweetened beverages, (2) food and beverages with non-sugar sweeteners, (3) ultra-processed
    food and beverages (as defined by the FDA based on recommendations from the National Academies
    of Science, Engineering, and Medicine), and (4) food and beverages with certain nutrients
    (e.g., sugar, saturated fat, sodium) at levels that increase health risks. These warnings
    must contain specified information regarding the risks of developing certain health conditions
    (e.g., diabetes); warnings for sugar-sweetened beverages and for non-sugar sweetened food
    and beverages must specifically say that these products are not recommended for children.


    Additionally, the bill prohibits marketing or advertising these products to children under
    the Federal Food, Drug, and Cosmetic Act, which is primarily enforced by the FDA. Further,
    marketing or advertising these products to children, or without the required warnings,
    is considered an unfair or deceptive trade practice that is subject to action by the Federal
    Trade Commission (FTC). The bill specifically restores the FTC''s statutory authority
    to regulate advertising targeting children (this authority was removed in 1980).


    Finally, the bill expands research on nutrition science and requires a public education
    campaign about nutrition and the new warning labels.'
  summary_version: Introduced in House
  summary_date: '2025-11-25'
  summary_truncated: false
