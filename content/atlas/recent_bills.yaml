- bill: S 2619
  congress: 119
  title: MORE DOT Grants Act
  action_date: '2025-07-31'
  action: Read twice and referred to the Committee on Commerce, Science, and Transportation.
  origin_chamber: Senate
  url: https://www.congress.gov/bill/119th-congress/senate-bill/2619
  summary: 'More Opportunities for Rural Economies from DOT Grants Act or the MORE DOT Grants
    Act


    This bill revises the process for awarding grants to high-density public land counties
    and any units of tribal or local governments within such counties under certain Department
    of Transportation (DOT) programs. Examples of qualifying grant programs include the Better
    Utilizing Investments to Leverage Development (BUILD) grant program, the Infrastructure
    for Rebuilding America (INFRA) grant program, and the Airport Improvement Program (AIP).


    The bill defines a high-density public land county as a county that has a population of
    not more than 100,000 people and in which the federal government owns or manages more
    than 50% of the land.


    For these jurisdictions, any requirement for local matching funds under a qualifying grant
    program must be reduced by 50%.


    On request, DOT must provide additional technical assistance to such jurisdictions before
    and during the annual application period for each qualifying grant program.


    DOT must also prioritize grant applications from such jurisdictions that have not received
    support under the qualifying grant program during the 10-year period preceding the date
    of the application.


    In approving applications for a qualifying grant program that includes a designated rural-set
    aside, DOT must give special consideration to an application from a high-density public
    land county or unit of local government within such a county.'
  summary_version: Introduced in Senate
  summary_date: '2025-07-31'
  summary_truncated: false
