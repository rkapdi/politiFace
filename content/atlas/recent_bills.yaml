  summary: 'Main Street Capital Access Act or the Main Street Act


    This bill lessens and otherwise modifies banking regulations, including those regarding
    institution formation, supervision by federal financial regulators, and bank merger requirements.


    Under the bill, new banks have a three-year phase-in period to meet certain capital requirements.
    The bill also reduces the leverage ratio for certain rural community banks.


    Financial regulators must (1) tailor regulatory actions to limit burdens on financial
    institutions and must consider the institutions'' risk profiles and business models, and
    (2) review their regulations more frequently and expand the scope of these reviews.


    The bill eases requirements regarding bank mergers, for example, by allowing financial
    regulators to approve certain bank mergers without considering if the merger is noncompetitive
    or monopolistic.


    The bill increases the dollar asset thresholds for various fees, reporting requirements,
    and other regulatory requirements so that more financial companies and banks are exempt
    from these requirements. For example, the bill increases the total asset threshold above
    which financial holding companies need Federal Reserve Board approval to acquire a company,
    thereby allowing for more acquisitions without board approval. The bill also raises certain
    asset thresholds so as to allow additional small bank holding companies to operate with
    higher debt levels and additional small banks to qualify for a longer examination cycle.


    The bill also provides flexibilities regarding the use of reciprocal deposits, the resolution
    of failed banks, and other regulated activities.'
  summary_version: Reported to House
  summary_date: '2026-04-20'
