  congress: 119
  title: Removing Barriers to Work for Disabled Americans Act
  action_date: '2026-07-20'
  action: Rules Committee Resolution H. Res. 1438 Reported to House. Rule provides for consideration
    of H.R. 8800, H.R. 8884, H. Con. Res. 113, H.R. 7008, H.R. 6955 and H.R. 9770. The resolution
    provides for consideration of H.R. 8800 under a structured rule and for consideration
    of H.R. 8884, H. Con. Res. 113, H.R. 7008, H.R. 6955, and H.R. 9770 under a closed rule,
    with one hour of debate on each measure and one motion to recommit H.R. 8800, H.R. 8844,
    H.R. 7008, H.R. 6955, and H.R. 9770.
  origin_chamber: House
  url: https://www.congress.gov/bill/119th-congress/house-bill/8884
  summary: 'Removing Barriers to Work for Disabled Americans Act


    This bill reauthorizes through 2031 the Social Security Administration’s (SSA’s) authority
    to carry out demonstration projects within the Social Security Disability Insurance (SSDI)
    program. The bill also imposes requirements related to beneficiary income, project funding,
    and SSA reporting.


    SSDI demonstration projects must be designed to promote attachment to the workforce and
    generally involve temporary changes to SSDI policies tested on a subset of beneficiaries.
    Participation in a demonstration project must be voluntary. SSA’s authority to carry out
    these projects expired on December 31, 2022.


    Under the bill, SSA must ensure that an individual’s participation in a demonstration
    project does not reduce their total income. Further, the bill specifies that administrative
    expenses related to demonstration projects must be paid from funds appropriated for administration.


    Finally, the bill requires SSA to report to Congress 120 days before initiating a demonstration
    project. This is an increase from 90 days under current law. This advance notification
    must include evaluation metrics for the relevant project.'
  summary_version: Reported to House
