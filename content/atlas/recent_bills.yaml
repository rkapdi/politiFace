- bill: S 1383
  congress: 119
  title: Veterans Accessibility Advisory Committee Act of 2025
  action_date: '2026-03-26'
  action: 'Considered by Senate (Message from the House considered). (consideration: CR S1647)'
  origin_chamber: Senate
  url: https://www.congress.gov/bill/119th-congress/senate-bill/1383
  summary: 'Safeguard American Voter Eligibility Act or the SAVE America Act


    This bill requires individuals to provide documentary proof of U.S. citizenship when registering
    to vote, and requires photo identification to vote, in federal elections.


    Specifically, the bill prohibits states from accepting and processing an application to
    register to vote in a federal election unless the applicant presents documentary proof
    of U.S. citizenship. The bill specifies what documents are considered acceptable proof
    of U.S. citizenship, such as identification that complies with the REAL ID Act of 2005
    that indicates U.S. citizenship, a valid U.S. passport, or a valid government-issued photo
    identification card that shows the applicant''s place of birth was in the United States.


    Further, the bill (1) requires states to accept and process a voter registration application
    in the event of a name discrepancy in the applicant''s documentation, as long as the applicant
    provides additional documentation; and (2) requires states to establish an alternative
    process to demonstrate U.S. citizenship.


    Within 30 days of the bill''s enactment, each state must take affirmative steps on an
    ongoing basis to ensure that only U.S. citizens are registered to vote, which shall include
    establishing a program to identify individuals who are not U.S. citizens using information
    supplied by certain sources. Further, each state must submit its complete official list
    of eligible voters to the Department of Homeland Security for comparison with the Systematic
    Alien Verification for Entitlements system, which is used to verify immigration status.
    Individuals who are identified as noncitizens must be given the opportunity to provide
    documentary proof of U.S. citizenship.


    Additionally, states must remove noncitizens from their official lists of eligible voters.


    The bill (1) provides for a private right of action for certain violations, and (2) establishes
    criminal penalties for certain offenses.


    The bill prohibits a state or local election official from providing a ballot for a federal
    election to an individual who does not present valid physical photo identification.'
  summary_version: Passed House
  summary_date: '2026-02-11'
  summary_truncated: true
