- bill: HR 9504
  congress: 119
  title: Tax Exempt Hospital Transparency Act
  action_date: '2026-07-01'
  action: 'Ordered to be Reported in the Nature of a Substitute by the Yeas and Nays: 25 -
    15.'
  origin_chamber: House
  url: https://www.congress.gov/bill/119th-congress/house-bill/9504
  summary: 'Tax Exempt Hospital Transparency Act


    This bill requires tax-exempt hospital organizations to report additional information
    to the Internal Revenue Service.


    The bill defines a tax-exempt hospital organization as an organization that is licensed
    or recognized as a hospital and is required to


    conduct a community health needs assessment and adopt a strategy to meet the needs identified
    in the assessment,


    have a written financial assistance policy,


    limit charges for emergency and medically necessary care provided to individuals eligible
    for financial assistance and prohibit the use of gross charges,


    meet certain billing and collection requirements, and


    file IRS Form 990 (Return of Organization Exempt From Income Tax).


    Under the bill, a tax-exempt hospital organization must include with Form 990 certain
    identifying information and


    a description of how the organization addresses the needs identified in the most recent
    community health needs assessment, the needs not addressed, and the reasons why needs
    are not being addressed;


    audited financial statements;


    the value (at cost) of the financial assistance provided; and


    the numbers of completed financial assistance applications received, granted, and denied
    during the tax year.


    Further information reporting requirements are imposed on certain large or high-revenue
    tax-exempt hospital organizations.


    Finally, the bill requires the Government Accountability Office to (1) study and report
    the costs associated with the additional information reporting requirements, and (2) estimate
    the amount of tax revenue that would be generated from the 25 tax-exempt hospital organizations
    with the highest gross revenue if such organizations were not exempt from tax.'
  summary_version: Introduced in House
  summary_date: '2026-06-29'
  summary_truncated: false
- bill: HR 2978
  congress: 119
  title: GUARD Act
  action_date: '2026-06-24'
  action: Reported (Amended) by the Committee on Financial Services. H. Rept. 119-709, Part
    I.
  origin_chamber: House
  url: https://www.congress.gov/bill/119th-congress/house-bill/2978
  summary: 'Guarding Unprotected Aging Retirees from Deception Act of 2026 or the GUARD Act
    of 2026


    This bill allows state, local, and tribal law enforcement agencies and grantees that receive
    funds from certain law enforcement grant programs to use the funds to investigate general
    financial fraud, elder financial fraud, and pig butchering. Pig butchering refers to a
    confidence and investment fraud in which a victim is gradually lured into transferring
    increasing amounts of money, generally in the form of cryptocurrency, into a fake virtual
    investment.


    The bill allows federal law enforcement agencies to assist state, local, and tribal law
    enforcement agencies and fusion centers in the use of tracing tools for blockchain and
    related technology tools.


    Finally, the bill requires the Financial Crimes Enforcement Network (FinCEN) to report
    on efforts to combat general financial fraud, elder financial fraud, pig butchering, and
    scams, including an evaluation of any legislative recommendations to improve the efforts.
    The bill also requires FinCEN to report on the state of general financial fraud, elder
    financial fraud, pig butchering, and scams in the United States, including trends in the
    crimes.'
  summary_version: Reported to House
  summary_date: '2026-06-24'
  summary_truncated: false
- bill: HR 2152
  congress: 119
  title: AI PLAN Act
  action_date: '2026-06-24'
  action: Placed on the Union Calendar, Calendar No. 615.
  origin_chamber: House
  url: https://www.congress.gov/bill/119th-congress/house-bill/2152
  summary: 'Artificial Intelligence Practices, Logistics, Actions, and Necessities Act or
    the AI PLAN Act


    This bill requires the Department of the Treasury, the Department of Homeland Security
    (DHS), and the Department of Commerce to submit a report on the risks posed by the use
    of artificial intelligence in the commission of financial crimes by adversarial actors.


    The report must


    describe interagency, intergovernmental, and public-private partnership activities, policies,
    and procedures to defend U.S. interests against the national and economic security risks
    posed by the use of artificial intelligence in the commission of financial crimes;


    provide a list of readily available resources that can be immediately deployed by federal
    agencies to combat these risks, and


    provide a list of resources needed by federal agencies to combat these risks.


    Risks that must be considered by the report include deepfakes, voice cloning, foreign
    election interference, synthetic identities, false flags that disrupt market operations,
    AI-supported social engineering, and general digital fraud.


    After submission of this report, Treasury, DHS, and Commerce must make recommendations
    for legislation and best practices for businesses and government entities to address these
    risks.'
