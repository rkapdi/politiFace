  title: Accelerating Access to Critical Therapies for ALS Reauthorization Act of 2026
  action_date: '2026-07-20'
  action: At the conclusion of debate, the chair put the question on the motion to suspend
    the rules. Mr. Guthrie objected to the vote on the grounds that a quorum was not present.
    Further proceedings on the motion were postponed. The point of no quorum was considered
