- bill: S 1941
  congress: 119
  title: Cure Hepatitis C Act of 2025
  action_date: '2025-06-04'
  action: Read twice and referred to the Committee on Health, Education, Labor, and Pensions.
  origin_chamber: Senate
  url: https://www.congress.gov/bill/119th-congress/senate-bill/1941
  summary: 'Cure Hepatitis C Act of 2025


    This bill establishes programs and requirements to provide free medications to treat hepatitis
    C in certain high-risk or vulnerable populations. It also establishes grants and other
    resources to support testing and treatment for hepatitis C. The bill provides funding
    for FY2025 to implement these provisions.


    The Department of Health and Human Services (HHS) must enter into a five-year purchasing
    contract with manufacturers of drugs that treat hepatitis C so that eligible individuals
    may receive the drugs without cost-sharing. Eligible individuals are those diagnosed with
    hepatitis C who are (1) enrolled in Medicaid or the Children’s Health Insurance Program
    (CHIP), (2) confined to federal, state, or local correctional facilities (or were released
    and began treatment there), (3) uninsured, or (4) receiving health care through the Indian
    Health Service.


    Eligibility is limited to those with specified legal immigration statuses. State Medicaid
    and CHIP programs and state and local correctional facilities may opt into the program;
    participation is mandatory for federal correctional facilities and the Indian Health Service.


    HHS must award grants to certain entities, including states, public health organizations,
    and correctional facilities, to support the coordination and provision of screening, treatment,
    and supportive services for the affected populations.


    The bill also allows Medicare beneficiaries to receive hepatitis C drugs without cost-sharing
    from 2027-2031.'
  summary_version: Introduced in Senate
  summary_date: '2025-06-04'
  summary_truncated: false
