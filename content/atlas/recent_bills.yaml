  title: FARM Act
  action_date: '2025-01-22'
  action: Read twice and referred to the Committee on Banking, Housing, and Urban Affairs.
  origin_chamber: Senate
  url: https://www.congress.gov/bill/119th-congress/senate-bill/179
  summary: 'Foreign Adversary Risk Management Act or the FARM Act


    This bill places the Secretary of Agriculture on the Committee on Foreign Investment in
    the United States (CFIUS). It also requires CFIUS to review any investment that could
    result in foreign control of any U.S. agricultural business.


    Further, the bill includes agricultural systems and supply chains in the definitions of
    critical infrastructure and critical technologies for the purposes of reviewing such investments.


    The Department of Agriculture and the Government Accountability Office must each analyze
    and report on foreign influence in the U.S. agricultural industry.'
  summary_version: Introduced in Senate
  summary_date: '2025-01-22'
  summary_truncated: false
