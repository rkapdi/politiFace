  summary: 'This bill provides for the transfer of the Forest Service''s interest in the approximately
    0.62-acre parcel of land within the Chickasaw State Forest to the state of Tennessee in
    order to resolve the encroachment of Bethel Baptist Church on that parcel. Both the parcel
