- bill: HR 9770
  congress: 119
  title: Making continuing appropriations for fiscal year 2027, and for other purposes.
  action_date: '2026-07-20'
  action: Rules Committee Resolution H. Res. 1438 Reported to House. Rule provides for consideration
    of H.R. 8800, H.R. 8884, H. Con. Res. 113, H.R. 7008, H.R. 6955 and H.R. 9770. The resolution
    provides for consideration of H.R. 8800 under a structured rule and for consideration
    of H.R. 8884, H. Con. Res. 113, H.R. 7008, H.R. 6955, and H.R. 9770 under a closed rule,
    with one hour of debate on each measure and one motion to recommit H.R. 8800, H.R. 8844,
    H.R. 7008, H.R. 6955, and H.R. 9770.
  origin_chamber: House
  url: https://www.congress.gov/bill/119th-congress/house-bill/9770
  summary: 'Continuing Appropriations Act, 2027


    This bill provides continuing FY2027 appropriations for federal agencies and extends various
    expiring programs and authorities.


    Specifically, the bill provides continuing FY2027 appropriations to federal agencies through
    the earlier of December 4, 2026, or the enactment of the applicable appropriations act.
    It is known as a continuing resolution (CR) and prevents a government shutdown that would
    otherwise occur if the FY2027 appropriations bills have not been enacted when FY2027 begins
    on October 1, 2026.


    The CR funds most programs and activities at the FY2026 levels with several exceptions
    that provide funding flexibility or additional appropriations for various programs. For
    example, the bill includes exceptions for


    the Special Supplemental Nutrition Program for Women, Infants, and Children (WIC);


    Small Business Administration loan programs;


    the Federal Emergency Management Agency’s Disaster Relief Fund;


    the Indian Health Service; and


    wildfire suppression activities.


    In addition, the bill extends several expiring programs, authorities, and restrictions,
    including


    the Department of Agriculture’s livestock mandatory price reporting program,


    the National Flood Insurance Program,


    limits on pay increases for the Vice President and certain senior political appointees,


    the Temporary Assistance for Needy Families (TANF) program,


    the authority to waive certain pay limitations that apply to wildland firefighters and
    other wildland fire personnel,


    the authority for the District of Columbia to spend local funds, and


    the freeze on cost-of-living adjustments for Members of Congress.


    The bill also provides the customary payments to the beneficiaries of the late Representative
    David Scott and the late Senator Lindsey Graham.'
  summary_version: Introduced in House
  summary_date: '2026-07-18'
